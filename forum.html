<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doubt Portal | JEE Master Hub</title>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true,
                processEnvironments: true
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --blue: #003366; --red: #A0050D; --bg: #f4f7f9; --green: #28a745; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; text-align: center; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: var(--blue); font-size: 1.2rem; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        textarea { width: 100%; height: 80px; border: 1px solid #ddd; border-radius: 10px; padding: 10px; box-sizing: border-box; resize: none; font-size: 16px; }
        .btn-post { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .doubt-item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid var(--red); box-shadow: 0 2px 8px rgba(0,0,0,0.05); text-align: left; }
        .q-text { font-weight: bold; color: var(--blue); display: block; margin-bottom: 10px; font-size: 1.05rem; line-height: 1.6; }
        .ans-box { background: #f0fdf4; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 0.95rem; border-left: 3px solid var(--green); color: #155724; }
        .reply-group { display: flex; gap: 5px; margin-top: 12px; border-top: 1px solid #eee; padding-top: 10px; }
        .reply-input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        .btn-reply { background: var(--green); color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>📈 Your Progress Graph</h2>
        <canvas id="myChart" style="width: 100%; height: 200px;"></canvas>
    </div>

    <div class="card">
        <h2>❓ Ask a Doubt</h2>
        <textarea id="qBox" placeholder="Formulae ke liye $ use karein, jaise: $\Delta U$"></textarea>
        <button class="btn-post" onclick="postDoubt()">Post to Community</button>
    </div>

    <h2 style="color: var(--blue);">💬 Community Doubts</h2>
    <div id="doubtList">Loading...</div>
</div>

<script>
    const API = "https://sheetdb.io/api/v1/pqdhac1zdqmck";

    async function postDoubt() {
        const txt = document.getElementById('qBox').value.trim();
        if(!txt) return alert("Kuch toh likho!");
        const payload = { "id": Date.now().toString(), "question": txt, "answer": "" };
        try {
            const res = await fetch(API, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ data: [payload] })
            });
            if(res.ok) { alert("Doubt Saved!"); document.getElementById('qBox').value = ""; loadDoubts(); }
        } catch(e) { alert("Error!"); }
    }

    async function loadDoubts() {
        try {
            const res = await fetch(API);
            const data = await res.json();
            const list = document.getElementById('doubtList');
            list.innerHTML = "";
            
            data.reverse().forEach(item => {
                let qText = item.question || item.Question || "No Text Found";
                
                // --- AUTO-FIX LOGIC: \Delta jaise words ko $ ke andar wrap karna ---
                qText = qText.replace(/(\\Delta|\\sqrt|\\alpha|\\beta|\\gamma|\\infty|\\rightarrow)/g, '$$$1$$');
                
                list.innerHTML += `
                    <div class="doubt-item">
                        <span class="q-text">Q: ${qText}</span>
                        <div class="ans-box" style="display:${item.answer ? 'block' : 'none'}">
                            <b>A:</b> ${item.answer}
                        </div>
                        <div class="reply-group">
                            <input type="text" id="in-${item.id}" class="reply-input" placeholder="Reply...">
                            <button class="btn-reply" onclick="postAnswer('${item.id}')">Reply</button>
                        </div>
                    </div>`;
            });

            if (window.MathJax) {
                window.MathJax.typesetPromise();
            }
        } catch(e) { console.log("Load Error"); }
    }

    async function postAnswer(docId) {
        const ansVal = document.getElementById('in-' + docId).value.trim();
        if(!ansVal) return;
        try {
            const res = await fetch(`${API}/id/${docId}`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ data: { "answer": ansVal } })
            });
            if(res.ok) { alert("Answer Saved!"); loadDoubts(); }
        } catch(e) { alert("Reply Error!"); }
    }

    function initChart() {
        let history = JSON.parse(localStorage.getItem('jee_score_history')) || [];
        new Chart(document.getElementById('myChart'), {
            type: 'line',
            data: {
                labels: history.map(h => h.date),
                datasets: [{ label: 'Score', data: history.map(h => h.score), borderColor: '#28a745', tension: 0.3, fill: true, backgroundColor: 'rgba(40, 167, 69, 0.1)' }]
            }
        });
    }

    initChart();
    loadDoubts();
// Image ko ImgBB par bhejne ke liye
async function uploadToImgBB() {
    const fileInput = document.getElementById('imgInput');
    const status = document.getElementById('uploadStatus');
    const file = fileInput.files[0];
    if (!file) return;

    if (file.size > 4 * 1024 * 1024) {
        alert("Photo 4MB se badi hai!");
        return;
    }

    status.innerText = "Uploading... ⏳";
    const formData = new FormData();
    formData.append("image", file);

    try {
        const res = await fetch("https://api.imgbb.com/1/upload?key=7ec065660882e3895e796065691079d3", {
            method: "POST",
            body: formData
        });
        const data = await res.json();
        if(data.success) {
            document.getElementById('finalImgUrl').value = data.data.url;
            status.innerText = "✅ Photo Attached!";
            status.style.color = "green";
        }
    } catch (e) {
        alert("Upload failed!");
        status.innerText = "Upload Photo";
    }
}
</script>
</body>
</html>
