<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doubt Portal | JEE Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --blue: #003366; --red: #A0050D; --bg: #f4f7f9; }
        body { font-family: sans-serif; background: var(--bg); padding: 15px; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; max-width: 500px; margin-inline: auto; }
        textarea { width: 100%; height: 70px; border-radius: 8px; border: 1px solid #ddd; padding: 10px; box-sizing: border-box; }
        .btn { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; margin-top: 10px; font-weight: bold; cursor: pointer; }
        .doubt-item { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid var(--red); text-align: left; max-width: 500px; margin-inline: auto; }
    </style>
</head>
<body>

    <div class="card">
        <h3>📈 Performance</h3>
        <canvas id="myChart"></canvas>
    </div>

    <div class="card">
        <h3>❓ Ask Doubt</h3>
        <textarea id="qBox" placeholder="Yahan apna sawaal likhein..."></textarea>
        <button class="btn" onclick="postDoubt()">Send to Community</button>
    </div>

    <div id="list">Loading...</div>

<script>
    const API = "https://sheetdb.io/api/v1/pqdhac1zdqmck";

    // 1. Sawaal Bhejna
    async function postDoubt() {
        const txt = document.getElementById('qBox').value.trim();
        if(!txt) return alert("Kuch toh likho bhai!");

        // Payload ko strict rakhna hai
        const data = { "id": Date.now().toString(), "question": txt, "answer": "" };

        try {
            const res = await fetch(API, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ data: [data] })
            });
            if(res.ok) {
                alert("Sawaal chala gaya!");
                document.getElementById('qBox').value = "";
                loadDoubts();
            }
        } catch(e) { alert("Error!"); }
    }

    // 2. Sawaal Dikhana
    async function loadDoubts() {
        const res = await fetch(API);
        const data = await res.json();
        const div = document.getElementById('list');
        div.innerHTML = "";
        
        data.reverse().forEach(item => {
            // Agar question undefined hai toh purana data check karo
            let qText = item.question || item.Question || "No Text in Sheet";
            div.innerHTML += `
                <div class="doubt-item">
                    <b>Q: ${qText}</b>
                    <div style="margin-top:5px; color:#28a745; display:${item.answer?'block':'none'}">
                        <b>A:</b> ${item.answer}
                    </div>
                </div>`;
        });
    }

    // 3. Graph (Pichle tests ka)
    function showChart() {
        let history = JSON.parse(localStorage.getItem('jee_score_history')) || [];
        new Chart(document.getElementById('myChart'), {
            type: 'line',
            data: {
                labels: history.map(h => h.date),
                datasets: [{ label: 'Score', data: history.map(h => h.score), borderColor: 'green', tension: 0.3 }]
            }
        });
    }

    showChart();
    loadDoubts();
</script>
</body>
</html>
