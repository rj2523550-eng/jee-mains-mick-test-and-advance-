<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEE Flashcards | Master Hub</title>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$']]
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --p: #003366; --bg: #f4f7f9; --phy: #007bff; --chem: #28a745; --math: #dc3545; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: 0 auto; text-align: center; }

        .header { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* Tabs Styling */
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .tab-btn { padding: 10px 15px; border-radius: 25px; border: none; background: white; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .active-phy { background: var(--phy) !important; color: white; }
        .active-chem { background: var(--chem) !important; color: white; }
        .active-math { background: var(--math) !important; color: white; }

        /* Flashcard Animation */
        .card-container { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .flashcard { background: transparent; height: 180px; perspective: 1000px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .flashcard.flipped .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            display: flex; align-items: center; justify-content: center; padding: 20px;
            box-sizing: border-box; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            font-size: 16px; font-weight: 600; text-align: center;
        }

        .card-front { background: white; border-top: 5px solid #ccc; color: var(--p); }
        .card-back { color: white; transform: rotateY(180deg); font-weight: 400; }

        /* Subject Specific Themes */
        .theme-Physics .card-front { border-top-color: var(--phy); }
        .theme-Physics .card-back { background: var(--phy); }
        .theme-Chemistry .card-front { border-top-color: var(--chem); }
        .theme-Chemistry .card-back { background: var(--chem); }
        .theme-Maths .card-front { border-top-color: var(--math); }
        .theme-Maths .card-back { background: var(--math); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="color: var(--p); margin: 0;"><i class="fas fa-layer-group"></i> Revision Flashcards</h2>
        <p style="font-size: 12px; color: #666;">Select Subject & Tap card to flip</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active-phy" id="btn-phy" onclick="filterCards('Physics', this)">Physics</button>
        <button class="tab-btn" id="btn-chem" onclick="filterCards('Chemistry', this)">Chemistry</button>
        <button class="tab-btn" id="btn-math" onclick="filterCards('Maths', this)">Maths</button>
    </div>

    <div class="card-container" id="cardList"></div>
</div>

<script>
    // Sabse important: All cards ka data ek hi array mein
    const allCards = [
        // --- PHYSICS ---
        { sub: "Physics", q: "Bernoulli's Equation?", a: "$P + \\frac{1}{2}\\rho v^2 + \\rho gh = \\text{const}$" },
        { sub: "Physics", q: "Torque Formula?", a: "$\\vec{\\tau} = \\vec{r} \\times \\vec{F}$ or $\\tau = I\\alpha$" },

        // --- CHEMISTRY ---
        { sub: "Chemistry", q: "Ideal Gas Equation?", a: "$PV = nRT$" },
        { sub: "Chemistry", q: "Arrhenius Equation?", a: "$k = A e^{-E_a/RT}$" },

        // --- MATHS (Coordinate Geometry Added) ---
        { sub: "Maths", q: "Distance Formula?", a: "$$d = \\sqrt{(x_2-x_1)^2 + (y_2-y_1)^2}$$" },
        { sub: "Maths", q: "Section Formula (Internal)?", a: "$$P(x, y) = \\left( \\frac{mx_2+nx_1}{m+n}, \\frac{my_2+ny_1}{m+n} \\right)$$" },
        { sub: "Maths", q: "Standard Circle Equation?", a: "$x^2 + y^2 + 2gx + 2fy + c = 0$ <br> Center: $(-g, -f)$" },
        { sub: "Maths", q: "Radius of Circle?", a: "$$r = \\sqrt{g^2 + f^2 - c}$$" },
        { sub: "Maths", q: "Eccentricity (e) Conditions?", a: "Parabola: $e=1$, Ellipse: $e<1$, Hyperbola: $e>1$" }
    ];

    function filterCards(subject, btn) {
        // UI Tabs Update
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-phy', 'active-chem', 'active-math'));
        if(subject === 'Physics') btn.classList.add('active-phy');
        if(subject === 'Chemistry') btn.classList.add('active-chem');
        if(subject === 'Maths') btn.classList.add('active-math');

        const list = document.getElementById('cardList');
        list.innerHTML = "";

        // Filter data
        const filtered = allCards.filter(c => c.sub === subject);

        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = `flashcard theme-${subject}`;
            card.onclick = () => card.classList.toggle('flipped');
            card.innerHTML = `
                <div class="card-inner">
                    <div class="card-front"><div>${item.q}</div></div>
                    <div class="card-back"><div>${item.a}</div></div>
                </div>
            `;
            list.appendChild(card);
        });

        // MathJax Refresh: Naye cards aate hi unhe render karna
        if (window.MathJax) MathJax.typesetPromise();
    }

    // Shuru mein Physics load karein
    filterCards('Physics', document.getElementById('btn-phy'));
</script>

</body>
</html>
