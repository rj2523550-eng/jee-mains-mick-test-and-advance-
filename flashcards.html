<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEE Flashcards | Master Hub</title>
    
    <script>
        window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$']] } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script src="flash_data_phy.js"></script>
    <script src="flash_data_chem.js"></script>
    <script src="flash_data_math.js"></script>

    <style>
        :root { --p: #003366; --bg: #f4f7f9; --phy: #007bff; --chem: #28a745; --math: #dc3545; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 1000px; margin: 0 auto; text-align: center; }
        .header { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; }
        .tab-btn { padding: 10px 18px; border-radius: 25px; border: none; background: white; cursor: pointer; font-weight: bold; font-size: 13px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .active-phy { background: var(--phy) !important; color: white; }
        .active-chem { background: var(--chem) !important; color: white; }
        .active-math { background: var(--math) !important; color: white; }

        .card-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        @media (max-width: 800px) { .card-container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 500px) { .card-container { grid-template-columns: 1fr; } }

        .flashcard { background: transparent; height: 200px; perspective: 1000px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .flashcard.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 15px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); text-align: center; }
        .card-front { background: white; border-top: 5px solid #ccc; color: var(--p); font-size: 15px; font-weight: 600; }
        .card-back { color: white; transform: rotateY(180deg); font-weight: 400; font-size: 14px; }

        .theme-Physics .card-front { border-top-color: var(--phy); }
        .theme-Physics .card-back { background: var(--phy); }
        .theme-Chemistry .card-front { border-top-color: var(--chem); }
        .theme-Chemistry .card-back { background: var(--chem); }
        .theme-Maths .card-front { border-top-color: var(--math); }
        .theme-Maths .card-back { background: var(--math); }
  .share-icon {
    position: absolute;
    bottom: 10px;
    right: 10px;
    color: #888;
    cursor: pointer;
    font-size: 16px;
    z-index: 10; /* Taaki click sahi se ho */
    padding: 5px;
}

.share-icon:hover {
    color: var(--p); /* Theme color pick karega */
}
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0;"><i class="fas fa-layer-group"></i> Smart Flashcards</h2>
        <p style="font-size: 12px; color: #666;">Separate files for easy editing!</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active-phy" id="btn-phy" onclick="showCards('Physics', physicsCards, this)">Physics</button>
        <button class="tab-btn" id="btn-chem" onclick="showCards('Chemistry', chemistryCards, this)">Chemistry</button>
        <button class="tab-btn" id="btn-math" onclick="showCards('Maths', mathsCards, this)">Maths</button>
    </div>

    <div class="card-container" id="cardList"></div>
</div>

<script>
    function showCards(subject, data, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-phy', 'active-chem', 'active-math'));
        if(subject === 'Physics') btn.classList.add('active-phy');
        if(subject === 'Chemistry') btn.classList.add('active-chem');
        if(subject === 'Maths') btn.classList.add('active-math');

        const list = document.getElementById('cardList');
        list.innerHTML = "";

        data.forEach(item => {
            const card = document.createElement('div');
            card.className = `flashcard theme-${subject}`;
            card.onclick = () => card.classList.toggle('flipped');
            card.innerHTML = `
                <div class="card-inner">
                    <div class="card-front"><div>${item.q}</div></div>
                    <div class="card-back"><div>${item.a}</div></div>
                </div>
            `;
            list.appendChild(card);
        });
        if (window.MathJax) MathJax.typesetPromise();
    }

    // Default load Physics on start
    window.onload = () => showCards('Physics', physicsCards, document.getElementById('btn-phy'));
</script>

</body>
</html>
