<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEE Master Flashcards</title>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$']],
                processEscapes: true
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --p: #003366; --bg: #f4f7f9; --phy: #007bff; --chem: #28a745; --math: #dc3545; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: 0 auto; text-align: center; }

        .header { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* Subject Tabs */
        .tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; }
        .tab-btn { padding: 10px 15px; border-radius: 25px; border: none; background: white; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .active-phy { background: var(--phy) !important; color: white; }
        .active-chem { background: var(--chem) !important; color: white; }
        .active-math { background: var(--math) !important; color: white; }

        /* Flashcard Container */
        .card-container { display: grid; grid-template-columns: 1fr; gap: 15px; }

        /* Card Flip Design */
        .flashcard { background: transparent; height: 200px; perspective: 1000px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .flashcard.flipped .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            display: flex; align-items: center; justify-content: center; padding: 15px;
            box-sizing: border-box; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            font-size: 15px; font-weight: 600; text-align: center; overflow: hidden;
        }

        .card-front { background: white; border-top: 5px solid #ccc; color: var(--p); }
        .card-back { color: white; transform: rotateY(180deg); font-weight: 400; font-size: 14px; }

        /* Theme Colors */
        .theme-Physics .card-front { border-top-color: var(--phy); }
        .theme-Physics .card-back { background: var(--phy); }
        .theme-Chemistry .card-front { border-top-color: var(--chem); }
        .theme-Chemistry .card-back { background: var(--chem); }
        .theme-Maths .card-front { border-top-color: var(--math); }
        .theme-Maths .card-back { background: var(--math); }

        .tag { position: absolute; top: 10px; right: 15px; font-size: 10px; opacity: 0.6; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="color: var(--p); margin: 0;"><i class="fas fa-brain"></i> Formula Flashcards</h2>
        <p style="font-size: 11px; color: #666;">Click on a card to reveal the formula</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active-phy" id="btn-phy" onclick="filterCards('Physics', this)">Physics</button>
        <button class="tab-btn" id="btn-chem" onclick="filterCards('Chemistry', this)">Chemistry</button>
        <button class="tab-btn" id="btn-math" onclick="filterCards('Maths', this)">Maths</button>
    </div>

    <div class="card-container" id="cardList"></div>
</div>

<script>
    const allCards = [
        // --- PHYSICS ---
        { sub: "Physics", q: "Torque ($\tau$) in terms of Moment of Inertia?", a: "$\\tau = I \\alpha$" },
        { sub: "Physics", q: "Bernoulli's Equation?", a: "$P + \\frac{1}{2}\\rho v^2 + \\rho gh = \\text{constant}$" },

        // --- CHEMISTRY ---
        { sub: "Chemistry", q: "Arrhenius Equation?", a: "$k = A e^{-E_a/RT}$" },
        { sub: "Chemistry", q: "Ideal Gas Law?", a: "$PV = nRT$" },

        // --- MATHS (Full Syllabus Added) ---
        // Algebra
        { sub: "Maths", q: "AP: $n^{th}$ term and Sum ($S_n$)?", a: "$a_n = a + (n-1)d$ <br> $S_n = \\frac{n}{2}[2a + (n-1)d]$" },
        { sub: "Maths", q: "Quadratic Formula & Discriminant?", a: "$x = \\frac{-b \\pm \\sqrt{b^2 - 4ac}}{2a}$ <br> $D = b^2 - 4ac$" },
        
        // Coordinate Geometry
        { sub: "Maths", q: "Distance & Section Formula?", a: "$d = \\sqrt{(x_2-x_1)^2 + (y_2-y_1)^2}$ <br> $P = (\\frac{mx_2+nx_1}{m+n}, \\frac{my_2+ny_1}{m+n})$" },
        { sub: "Maths", q: "Centroid of a Triangle?", a: "$G = (\\frac{x_1+x_2+x_3}{3}, \\frac{y_1+y_2+y_3}{3})$" },
        
        // Geometry (Circles)
        { sub: "Maths", q: "Area & Length of Sector?", a: "Area $= \\frac{\\theta}{360} \\times \\pi r^2$ <br> Length $= \\frac{\\theta}{360} \\times 2\\pi r$" },
        
        // Mensuration (Volumes)
        { sub: "Maths", q: "Volume of Cylinder, Cone & Sphere?", a: "Cyl: $\\pi r^2 h$ | Cone: $\\frac{1}{3}\\pi r^2 h$ | Sphere: $\\frac{4}{3}\\pi r^3$" },
        { sub: "Maths", q: "Surface Area (TSA) of Cylinder & Cone?", a: "Cyl: $2\\pi r(r+h)$ <br> Cone: $\\pi r(r+l)$" },
        
        // Statistics
        { sub: "Maths", q: "Empirical Relationship (Mean, Med, Mode)?", a: "$3 \\times \\text{Median} = \\text{Mode} + 2 \\times \\text{Mean}$" },
        { sub: "Maths", q: "Median Formula (Grouped Data)?", a: "$l + \\left( \\frac{\\frac{n}{2} - cf}{f} \\right) \\times h$" },
        { sub: "Maths", q: "Probability of Event $P(E)$?", a: "$P(E) = \\frac{\\text{Favorable Outcomes}}{\\text{Total Outcomes}}$" }
    ];

    function filterCards(subject, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-phy', 'active-chem', 'active-math'));
        if(subject === 'Physics') btn.classList.add('active-phy');
        if(subject === 'Chemistry') btn.classList.add('active-chem');
        if(subject === 'Maths') btn.classList.add('active-math');

        const list = document.getElementById('cardList');
        list.innerHTML = "";
        const filtered = allCards.filter(c => c.sub === subject);

        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = `flashcard theme-${subject}`;
            card.onclick = () => card.classList.toggle('flipped');
            card.innerHTML = `
                <div class="card-inner">
                    <div class="card-front"><span class="tag">${subject}</span><div>${item.q}</div></div>
                    <div class="card-back"><div>${item.a}</div></div>
                </div>
            `;
            list.appendChild(card);
        });

        if (window.MathJax) MathJax.typesetPromise();
    }

    // Default load Physics
    window.onload = () => filterCards('Physics', document.getElementById('btn-phy'));
</script>

</body>
</html>
