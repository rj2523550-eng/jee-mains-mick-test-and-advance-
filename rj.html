<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Own Words - Student Diary</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h2 {
            color: #333;
            text-align: center;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 300px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        textarea:focus {
            border-color: var(--primary-color);
        }

        .button-group {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .save-btn { background-color: #28a745; color: white; }
        .clear-btn { background-color: #dc3545; color: white; }
        
        button:hover { opacity: 0.9; }

        .status {
            text-align: center;
            font-size: 14px;
            margin-top: 10px;
            color: #666;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📝 My Own Words</h2>
    <p style="text-align: center; color: #777;">Apne notes ya dincharya yahan likhein...</p>
    
    <textarea id="studentNotes" placeholder="Yahan likhna shuru karein..."></textarea>

    <div class="button-group">
        <button class="save-btn" onclick="saveNotes()">Save Karein</button>
        <button class="clear-btn" onclick="clearNotes()">Clear Karein</button>
    </div>

    <p id="statusMsg" class="status"></p>
</div>

<script>
    const textarea = document.getElementById('studentNotes');
    const statusMsg = document.getElementById('statusMsg');

    // Page load hote hi purana data check karein
    window.onload = function() {
        const savedData = localStorage.getItem('student_diary_data');
        if (savedData) {
            textarea.value = savedData;
        }
    };

    // Data save karne ka function
    function saveNotes() {
        const content = textarea.value;
        localStorage.setItem('student_diary_data', content);
        statusMsg.innerText = "✅ Aapki baatein surakshit save ho gayi hain!";
        setTimeout(() => { statusMsg.innerText = ""; }, 3000);
    }

    // Data clear karne ka function
    function clearNotes() {
        if (confirm("Kya aap yakinan sab kuch mitana chahte hain?")) {
            textarea.value = "";
            localStorage.removeItem('student_diary_data');
            statusMsg.innerText = "🗑️ Sab kuch clear kar diya gaya hai.";
            setTimeout(() => { statusMsg.innerText = ""; }, 3000);
        }
    }
</script>

</body>
</html>
