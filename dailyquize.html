<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jee Master Hub - Daily Quiz</title>
    <style>
        :root { --primary: #2563eb; --danger: #dc2626; --success: #16a34a; }
        body { font-family: 'Segoe UI', sans-serif; background: #f3f4f6; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 600px; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); margin-bottom: 5px; }
        .hidden { display: none; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-start { background: var(--primary); color: white; }
        .btn-submit { background: var(--success); color: white; margin-top: 20px; }
        .timer { text-align: right; font-weight: bold; color: var(--danger); font-size: 1.2rem; }
        .question { margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .options label { display: block; padding: 10px; background: #f9fafb; margin: 5px 0; border-radius: 6px; cursor: pointer; border: 1px solid #eee; }
        .options input { width: auto; margin-right: 10px; }
        .history-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        .history-table th, .history-table td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        .solution { background: #e0f2fe; padding: 10px; border-radius: 6px; margin-top: 10px; font-size: 0.9rem; }
        .share-box { background: #fff7ed; border: 2px dashed #ed8936; padding: 15px; margin-top: 20px; text-align: center; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Jee Master Hub</h1>
    <p style="text-align: center; margin-bottom: 20px;">Target JEE 2026 🚀</p>

    <div id="login-section">
        <h3>User Details</h3>
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="text" id="district" placeholder="District" required>
        <select id="state">
            <option value="">Select State</option>
            <option value="UP">Uttar Pradesh</option>
            <option value="Bihar">Bihar</option>
            <option value="Maharashtra">Maharashtra</option>
            </select>
        <button class="btn btn-start" onclick="startQuiz()">Start Test</button>
        
        <div id="history-section" class="hidden">
            <h4>Last 10 Tests History</h4>
            <table class="history-table" id="history-table">
                <thead><tr><th>No.</th><th>Score</th><th>Date</th></tr></thead>
                <tbody id="history-body"></tbody>
            </table>
        </div>
    </div>

    <div id="quiz-section" class="hidden">
        <div class="timer" id="timer">10:00</div>
        <div id="questions-container"></div>
        <button class="btn btn-submit" onclick="submitQuiz()">Submit Test</button>
    </div>

    <div id="result-section" class="hidden">
        <h2 id="final-score"></h2>
        <div id="solutions-container"></div>
        
        <div class="share-box">
            <p><strong>🔥 Ye Result Dekhkar Log Hairan Reh Jayenge!</strong></p>
            <p id="share-text"></p>
            <button class="btn btn-start" style="background: #25d366;" onclick="shareResult()">WhatsApp par Share Karein</button>
        </div>
        <button class="btn btn-submit" onclick="location.reload()" style="background: #6b7280;">Restart</button>
    </div>
</div>

<script>
    const quizData = [
        { q: "1. Unit of Force is?", a: "Newton", o: ["Newton", "Joule", "Watt", "Pascal"], s: "Newton (N) is the SI unit of force." },
        { q: "2. Value of g on Earth surface?", a: "9.8 m/s²", o: ["8.8 m/s²", "9.8 m/s²", "10.8 m/s²", "11.8 m/s²"], s: "Standard gravity is 9.80665 m/s²." },
        { q: "3. Purest form of Carbon?", a: "Diamond", o: ["Coal", "Graphite", "Diamond", "Charcoal"], s: "Diamond is the purest crystalline allotrope of carbon." },
        { q: "4. Square root of 144?", a: "12", o: ["10", "11", "12", "13"], s: "12 x 12 = 144." },
        { q: "5. Chemical formula of Water?", a: "H2O", o: ["H2O", "CO2", "O2", "NaCl"], s: "Dihydrogen Monoxide is H2O." },
        { q: "6. Smallest Prime Number?", a: "2", o: ["0", "1", "2", "3"], s: "2 is the only even prime number." }
    ];

    let timer;
    let timeLeft = 600;

    window.onload = () => {
        showHistory();
    };

    function startQuiz() {
        if(!document.getElementById('name').value) return alert("Please enter name");
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('quiz-section').classList.remove('hidden');
        
        const container = document.getElementById('questions-container');
        quizData.forEach((data, index) => {
            container.innerHTML += `
                <div class="question">
                    <p><strong>Q${index+1}:</strong> ${data.q}</p>
                    <div class="options">
                        ${data.o.map(opt => `<label><input type="radio" name="q${index}" value="${opt}"> ${opt}</label>`).join('')}
                    </div>
                </div>
            `;
        });

        timer = setInterval(() => {
            timeLeft--;
            let min = Math.floor(timeLeft / 60);
            let sec = timeLeft % 60;
            document.getElementById('timer').innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
            if(timeLeft <= 0) submitQuiz();
        }, 1000);
    }

    function submitQuiz() {
        clearInterval(timer);
        let score = 0;
        let resultsHTML = '<h3>Detailed Solutions:</h3>';
        
        quizData.forEach((data, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            const isCorrect = selected && selected.value === data.a;
            
            if(isCorrect) score += 4;
            else if(selected) score -= 1;

            resultsHTML += `
                <div class="question">
                    <p><strong>Q${index+1}:</strong> ${data.q}</p>
                    <p style="color:${isCorrect ? 'green' : 'red'}">Your Answer: ${selected ? selected.value : 'Not Attempted'}</p>
                    <p style="color:green">Correct Answer: ${data.a}</p>
                    <div class="solution"><strong>Solution:</strong> ${data.s}</div>
                </div>
            `;
        });

        saveScore(score);
        document.getElementById('quiz-section').classList.add('hidden');
        document.getElementById('result-section').classList.remove('hidden');
        document.getElementById('final-score').innerText = `Your Score: ${score} / 24`;
        document.getElementById('solutions-container').innerHTML = resultsHTML;

        const name = document.getElementById('name').value;
        document.getElementById('share-text').innerText = `😱 Kya aap jante hain ${name} ne Jee Master Hub ke test me kitna score kiya? Isse dekh kar aapke hosh udd jayenge! Click karke apna score check karein!`;
    }

    function saveScore(score) {
        let history = JSON.parse(localStorage.getItem('jee_history') || '[]');
        history.unshift({ score: score, date: new Date().toLocaleDateString() });
        if(history.length > 10) history.pop();
        localStorage.setItem('jee_history', JSON.stringify(history));
    }

    function showHistory() {
        let history = JSON.parse(localStorage.getItem('jee_history') || '[]');
        if(history.length > 0) {
            document.getElementById('history-section').classList.remove('hidden');
            const body = document.getElementById('history-body');
            body.innerHTML = history.map((h, i) => `<tr><td>${i+1}</td><td>${h.score}</td><td>${h.date}</td></tr>`).join('');
        }
    }

    function shareResult() {
        const text = encodeURIComponent(document.getElementById('share-text').innerText + "\n\nTest Link: " + window.location.href);
        window.open(`https://api.whatsapp.com/send?text=${text}`);
    }
</script>

</body>
</html>
