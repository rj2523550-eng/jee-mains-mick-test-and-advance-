<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jee Master Hub - Daily Quiz</title>
    <style>
        :root { --primary: #2563eb; --danger: #dc2626; --success: #16a34a; --bg: #f3f4f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 700px; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); margin: 0; font-size: 28px; }
        .sub-title { text-align: center; color: #666; margin-bottom: 25px; font-weight: 500; }
        .hidden { display: none; }
        
        /* Form Styling */
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary); }
        
        /* Button Styling */
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn-start { background: var(--primary); color: white; }
        .btn-submit { background: var(--success); color: white; }
        .btn-share { background: #25d366; color: white; margin-top: 15px; }

        /* Quiz UI */
        .timer-box { position: sticky; top: 0; background: white; padding: 10px; border-bottom: 2px solid #eee; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .timer { color: var(--danger); font-size: 20px; font-weight: 800; }
        .question-card { margin-bottom: 30px; padding: 15px; border-bottom: 1px solid #f0f0f0; }
        .question-text { font-size: 18px; font-weight: 600; margin-bottom: 15px; line-height: 1.5; }
        .options label { display: block; padding: 12px; background: #f8fafc; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .options label:hover { background: #eff6ff; border-color: var(--primary); }
        
        /* Result & History */
        .result-header { text-align: center; padding: 20px; background: #f0fdf4; border-radius: 10px; margin-bottom: 20px; }
        .sol-box { padding: 15px; border-radius: 8px; margin-top: 10px; font-size: 14px; line-height: 1.6; }
        .sol-correct { border-left: 5px solid var(--success); background: #f0fdf4; }
        .sol-wrong { border-left: 5px solid var(--danger); background: #fef2f2; }
        .history-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .history-table th, .history-table td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        
        .share-card { background: #fff7ed; border: 2px dashed #f97316; padding: 20px; border-radius: 12px; text-align: center; margin-top: 30px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Jee Master Hub</h1>
    <p class="sub-title">Daily Practice Quiz (JEE Pattern)</p>

    <div id="login-section">
        <input type="text" id="userName" placeholder="Apna Poora Naam Likhein" required>
        <input type="text" id="district" placeholder="District ka Naam">
        <input type="text" id="state" placeholder="State ka Naam">
        <button class="btn btn-start" onclick="startQuiz()">Test Shuru Karein</button>
        
        <div id="history-container" class="hidden" style="margin-top: 30px;">
            <h4 style="margin-bottom:10px;">Pichle 10 Tests ka Record:</h4>
            <table class="history-table">
                <thead><tr style="background:#eee;"><th>Test No.</th><th>Score</th><th>Date</th></tr></thead>
                <tbody id="history-body"></tbody>
            </table>
        </div>
    </div>

    <div id="quiz-section" class="hidden">
        <div class="timer-box">
            <span>JEE Exam Window</span>
            <div class="timer" id="timerDisplay">10:00</div>
        </div>
        <div id="questions-list"></div>
        <button class="btn btn-submit" onclick="submitQuiz()">Submit Test Now</button>
    </div>

    <div id="result-section" class="hidden">
        <div class="result-header">
            <h2 id="finalScoreDisplay" style="margin:0; color: var(--success);"></h2>
            <p id="userNameDisplay" style="margin:5px 0 0 0; font-weight:bold;"></p>
        </div>
        
        <div id="detailed-solutions"></div>

        <div class="share-card">
            <h3 style="color:#c2410c; margin-top:0;">⚠️ Warning: Don't Share Your Rank!</h3>
            <p id="share-msg">Mera JEE ka score dekh kar mere teachers bhi hairan reh gaye! Kya tum mujhse behtar kar sakte ho? Himmat hai toh challenge accept karo!</p>
            <button class="btn btn-share" onclick="shareOnWhatsapp()">WhatsApp par Challenge Karein 🚀</button>
        </div>
        
        <button class="btn" onclick="location.reload()" style="background:#64748b; color:white;">Dobara Test Karein</button>
    </div>
</div>

<script>
    const questions = [
        {
            q: "The stopping potential for electrons emitted from a photosensitive surface illuminated by light of wavelength 400 nm is 1.2 V. When the incident wavelength is changed to 300 nm, the stopping potential will be:",
            options: ["2.25 V", "0.7 V", "1.8 V", "1.2 V"],
            correct: "2.25 V",
            sol: "Using Einstein’s equation: eV₀ = hc/λ - φ. Case 1: 1.2 = 1240/400 - φ/e ⇒ φ/e = 1.9 V. Case 2: V₀' = 1240/300 - 1.9 = 4.13 - 1.9 = 2.23 V. Approx 2.25 V."
        },
        {
            q: "A capacitor of capacitance C is charged to a potential V. The flux of the electric field through a closed surface enclosing the capacitor is:",
            options: ["CV/ε₀", "2CV/ε₀", "Zero", "CV/2ε₀"],
            correct: "Zero",
            sol: "According to Gauss's Law, total flux Φ = Q_enclosed/ε₀. In a capacitor, plates have +Q and -Q. Q_net = 0, so flux is Zero."
        },
        {
            q: "The spin-only magnetic moment of [Fe(H₂O)₆]²⁺ is:",
            options: ["5.92 BM", "4.90 BM", "2.84 BM", "0 BM"],
            correct: "4.90 BM",
            sol: "Fe²⁺ = [Ar] 3d⁶. H₂O is a Weak Field Ligand, so 4 unpaired electrons. μ = √(4(4+2)) = √24 ≈ 4.90 BM."
        },
        {
            q: "For a first-order reaction, if the time taken for 50% completion is 20 minutes, the time taken for 75% completion will be:",
            options: ["30 min", "60 min", "40 min", "10 min"],
            correct: "40 min",
            sol: "For first-order: t₇₅% = 2 × t₅₀%. So, 2 × 20 = 40 minutes."
        },
        {
            q: "The value of ∫ eˣ (1/x - 1/x²) dx is:",
            options: ["eˣ/x² + C", "-eˣ/x + C", "eˣ/x + C", "eˣ log x + C"],
            correct: "eˣ/x + C",
            sol: "Using ∫ eˣ [f(x) + f'(x)] dx = eˣ f(x) + C. Here f(x) = 1/x and f'(x) = -1/x²."
        },
        {
            q: "The area of the region bounded by the parabola y² = 4x and the line y = x is:",
            options: ["8/3", "4/3", "2/3", "1/3"],
            correct: "8/3",
            sol: "Intersection points are (0,0) and (4,4). Area = ∫₀⁴ (2√x - x) dx = [4/3 x³/² - x²/2]₀⁴ = 32/3 - 8 = 8/3."
        }
    ];

    let timer;
    let secondsLeft = 600;

    window.onload = loadHistory;

    function startQuiz() {
        const name = document.getElementById('userName').value;
        if (!name) { alert("Pehle apna naam bhariye!"); return; }

        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('quiz-section').classList.remove('hidden');

        const quizList = document.getElementById('questions-list');
        questions.forEach((q, i) => {
            quizList.innerHTML += `
                <div class="question-card">
                    <p class="question-text">Q${i+1}. ${q.q}</p>
                    <div class="options">
                        ${q.options.map(opt => `
                            <label><input type="radio" name="q${i}" value="${opt}"> ${opt}</label>
                        `).join('')}
                    </div>
                </div>
            `;
        });

        timer = setInterval(updateTimer, 1000);
    }

    function updateTimer() {
        let mins = Math.floor(secondsLeft / 60);
        let secs = secondsLeft % 60;
        document.getElementById('timerDisplay').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        if (secondsLeft <= 0) submitQuiz();
        secondsLeft--;
    }

    function submitQuiz() {
        clearInterval(timer);
        let score = 0;
        const solDiv = document.getElementById('detailed-solutions');
        solDiv.innerHTML = "<h3>Review & Solutions:</h3>";

        questions.forEach((q, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const val = selected ? selected.value : "Nahi diya";
            const isCorrect = val === q.correct;
            
            if (isCorrect) score += 4;
            else if (selected) score -= 1;

            solDiv.innerHTML += `
                <div class="sol-box ${isCorrect ? 'sol-correct' : 'sol-wrong'}">
                    <strong>Q${i+1}: ${isCorrect ? '✅ Sahi' : '❌ Galat'}</strong><br>
                    <span>Aapka Answer: ${val}</span><br>
                    <span style="color:var(--success)">Sahi Answer: ${q.correct}</span>
                    <p style="margin-top:10px; border-top:1px solid #ddd; padding-top:5px;"><strong>Solution:</strong> ${q.sol}</p>
                </div>
            `;
        });

        document.getElementById('quiz-section').classList.add('hidden');
        document.getElementById('result-section').classList.remove('hidden');
        document.getElementById('finalScoreDisplay').innerText = `Final Score: ${score} / 24`;
        document.getElementById('userNameDisplay').innerText = `Name: ${document.getElementById('userName').value}`;
        
        saveToHistory(score);
    }

    function saveToHistory(score) {
        let history = JSON.parse(localStorage.getItem('jee_quiz_history') || '[]');
        const entry = { score: score, date: new Date().toLocaleDateString() };
        history.unshift(entry);
        if (history.length > 10) history.pop();
        localStorage.setItem('jee_quiz_history', JSON.stringify(history));
    }

    function loadHistory() {
        let history = JSON.parse(localStorage.getItem('jee_quiz_history') || '[]');
        if (history.length > 0) {
            document.getElementById('history-container').classList.remove('hidden');
            const tbody = document.getElementById('history-body');
            tbody.innerHTML = history.map((h, i) => `<tr><td>${i+1}</td><td>${h.score}</td><td>${h.date}</td></tr>`).join('');
        }
    }

    function shareOnWhatsapp() {
        const name = document.getElementById('userName').value;
        const score = document.getElementById('finalScoreDisplay').innerText;
        const msg = encodeURIComponent(`🔥 Challenge Alert! 🚀\n\nJee Master Hub par mera score ${score} hai! \n${name} ne ye test crack kar liya, kya tumhare andar dum hai isse todne ka? \n\nAbhi click karo aur apna dum dikhao: ${window.location.href}`);
        window.open(`https://api.whatsapp.com/send?text=${msg}`);
    }
</script>

</body>
</html>
