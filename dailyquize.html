<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEE Daily Quiz: Login & Rank System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- PURANA THEME (NEON DARK) --- */
        :root {
            --bg-dark: #0a0a0a;
            --card-dark: #1a1a1a;
            --text-light: #e0e0e0;
            --neon-cyan: #00e5ff;
            --neon-green: #00ff00;
            --neon-red: #ff3333;
            --accent-purple: #8a2be2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-light); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        /* --- LOGIN MODAL STYLE --- */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .login-card {
            background: var(--card-dark); padding: 30px; border-radius: 15px; border: 1px solid var(--neon-cyan);
            width: 90%; max-width: 400px; text-align: center;
        }
        .login-card h2 { color: var(--neon-cyan); margin-bottom: 20px; }
        .login-card input {
            width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444;
            color: white; border-radius: 8px; outline: none;
        }
        .login-card input:focus { border-color: var(--neon-cyan); }

        /* --- QUIZ & RESULT STYLES --- */
        .quiz-container { background-color: var(--card-dark); padding: 30px; border-radius: 20px; width: 100%; max-width: 600px; border: 1px solid #333; display: none; }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .timer-box { font-size: 1.2rem; font-weight: 700; color: var(--neon-cyan); border: 2px solid var(--neon-cyan); padding: 8px 15px; border-radius: 10px; }
        .subject-tag { display: inline-block; font-size: 0.8rem; color: #000; background: var(--neon-cyan); padding: 4px 10px; border-radius: 5px; margin-bottom: 10px; font-weight: 600; }
        .options-grid { display: grid; gap: 12px; }
        .option-btn { background: #2a2a2a; color: white; border: 2px solid transparent; padding: 15px; border-radius: 12px; text-align: left; cursor: pointer; }
        .option-btn.selected { border-color: var(--neon-cyan); background: rgba(0, 229, 255, 0.1); }
        .btn-primary { background: var(--neon-cyan); color: #000; border: none; padding: 12px 25px; border-radius: 10px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 20px; }
        
        .hidden { display: none; }
        .rank-card { background: #222; padding: 15px; border-radius: 10px; margin-top: 20px; text-align: left; border-left: 4px solid var(--neon-green); }
        .user-info-display { color: var(--neon-cyan); font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2>Student Details 📝</h2>
        <p style="font-size: 0.8rem; margin-bottom: 15px;">Rank List mein aane ke liye details bharein</p>
        <input type="text" id="user-name" placeholder="Apna Poora Naam" required>
        <input type="text" id="user-state" placeholder="State (e.g. Maharashtra)" required>
        <input type="text" id="user-district" placeholder="District (e.g. Pune)" required>
        <button class="btn-primary" onclick="startQuizAfterLogin()">Start Daily Quiz 🔥</button>
    </div>
</div>

<div class="quiz-container" id="main-container">
    <div class="quiz-header">
        <div id="display-user-name" style="color: var(--neon-green); font-weight: 600;">Welcome!</div>
        <div class="timer-box" id="timer">05:00</div>
    </div>

    <div id="quiz-area">
        <span class="subject-tag" id="subject-tag">Subject</span>
        <h2 id="question-text">Question loading...</h2>
        <div class="options-grid" id="options-container"></div>
        <button class="btn-primary" id="next-btn" onclick="nextQuestion()">Next Question ›</button>
    </div>

    <div id="result-area" class="hidden">
        <h1 style="text-align: center;">Quiz Results 🎉</h1>
        
        <div class="rank-card">
            <p>Aapka Rank Status:</p>
            <div class="user-info-display" id="rank-display-name"></div>
            <p id="rank-display-location" style="font-size: 0.9rem; color: #aaa;"></p>
            <h2 style="margin-top: 10px; color: var(--neon-green);">Score: <span id="final-score"></span>/3</h2>
        </div>

        <div style="margin-top: 20px; background: #111; padding: 15px; border-radius: 10px;">
            <h3 style="color: var(--neon-cyan); margin-bottom: 10px;">🏆 Global Top 10 Today</h3>
            <div id="leaderboard-list">
                </div>
        </div>
    </div>
</div>

<script>
    let userData = { name: "", state: "", district: "" };
    let currentQuestionIndex = 0;
    let score = 0;
    let selectedOptionIndex = null;
    let timeLeft = 300;

    const questions = [
        { subject: "Physics", question: "Si unit of Electric Current is?", options: ["Volt", "Ampere", "Ohm", "Watt"], correct: 1 },
        { subject: "Chemistry", question: "Atomic number of Oxygen is?", options: ["6", "7", "8", "9"], correct: 2 },
        { subject: "Maths", question: "Value of log(1) is?", options: ["1", "0", "Infinity", "Not defined"], correct: 1 }
    ];

    // 1. START QUIZ AFTER LOGIN
    function startQuizAfterLogin() {
        userData.name = document.getElementById('user-name').value;
        userData.state = document.getElementById('user-state').value;
        userData.district = document.getElementById('user-district').value;

        if(!userData.name || !userData.state || !userData.district) {
            alert("Sabhi details bharna zaroori hai!");
            return;
        }

        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-container').style.display = 'block';
        document.getElementById('display-user-name').textContent = "Aspirant: " + userData.name;
        
        loadQuestion();
        startTimer();
    }

    function startTimer() {
        const timerInt = setInterval(() => {
            timeLeft--;
            let min = Math.floor(timeLeft/60);
            let sec = timeLeft%60;
            document.getElementById('timer').textContent = `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
            if(timeLeft <= 0) { clearInterval(timerInt); showResults(); }
        }, 1000);
    }

    function loadQuestion() {
        const q = questions[currentQuestionIndex];
        document.getElementById('subject-tag').textContent = q.subject;
        document.getElementById('question-text').textContent = q.question;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        q.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            btn.onclick = () => {
                document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedOptionIndex = idx;
            };
            container.appendChild(btn);
        });
        
        if(currentQuestionIndex === questions.length - 1) document.getElementById('next-btn').textContent = "Submit Results 🏁";
    }

    function nextQuestion() {
        if(selectedOptionIndex === null) { alert("Ek option chunein!"); return; }
        if(selectedOptionIndex === questions[currentQuestionIndex].correct) score++;
        
        selectedOptionIndex = null;
        currentQuestionIndex++;
        
        if(currentQuestionIndex < questions.length) loadQuestion();
        else showResults();
    }

    // 2. SHOW DYNAMIC RANK & DETAILS
    function showResults() {
        document.getElementById('quiz-area').classList.add('hidden');
        document.getElementById('result-area').classList.remove('hidden');
        document.getElementById('final-score').textContent = score;

        // User ki info update karein
        document.getElementById('rank-display-name').textContent = "👤 " + userData.name;
        document.getElementById('rank-display-location').textContent = `📍 ${userData.district}, ${userData.state}`;

        // Leaderboard Logic (Dyanmic name injection)
        const lb = document.getElementById('leaderboard-list');
        lb.innerHTML = `
            <div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #333; color:gold;">
                <span>1. ${userData.name} (YOU)</span>
                <span>${userData.district}</span>
            </div>
            <p style="font-size:0.8rem; color:#666; margin-top:10px;">Baaki ranks quiz khatam hone ke baad update hongi...</p>
        `;
    }
</script>

</body>
</html>
