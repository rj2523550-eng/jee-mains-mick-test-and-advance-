<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEE Daily Quiz: Global Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --card-dark: #1a1a1a;
            --neon-cyan: #00e5ff;
            --neon-green: #00ff00;
            --text-light: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-light); padding: 20px; display: flex; justify-content: center; }

        /* --- LOGIN MODAL --- */
        #login-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .login-card { background: var(--card-dark); padding: 30px; border-radius: 15px; border: 1px solid var(--neon-cyan); width: 90%; max-width: 400px; text-align: center; }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 8px; }

        /* --- QUIZ CONTAINER --- */
        .quiz-container { background: var(--card-dark); padding: 25px; border-radius: 20px; width: 100%; max-width: 500px; border: 1px solid #333; display: none; }
        .option-btn { width: 100%; background: #2a2a2a; color: white; border: 2px solid transparent; padding: 15px; border-radius: 12px; text-align: left; cursor: pointer; margin-bottom: 10px; }
        .option-btn.selected { border-color: var(--neon-cyan); background: rgba(0, 229, 255, 0.1); }
        .btn-primary { background: var(--neon-cyan); color: #000; border: none; padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 15px; }

        /* --- LEADERBOARD STYLE --- */
        .leaderboard-box { background: #111; padding: 15px; border-radius: 12px; margin-top: 20px; }
        .leaderboard-item { display: flex; justify-content: space-between; padding: 10px 5px; border-bottom: 1px solid #222; font-size: 0.9rem; }
        .rank-1 { color: #ffd700; font-weight: bold; }
        .rank-2 { color: #c0c0c0; }
        .rank-3 { color: #cd7f32; }

        /* --- SHARE BUTTON --- */
        .btn-share { background: #25D366; color: white; margin-top: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2>Student Login 🎓</h2>
        <input type="text" id="user-name" placeholder="Full Name">
        <input type="text" id="user-state" placeholder="State">
        <input type="text" id="user-district" placeholder="District">
        <button class="btn-primary" onclick="startQuiz()">Start Quiz</button>
    </div>
</div>

<div class="quiz-container" id="main-container">
    <div id="quiz-area">
        <h3 id="subject-tag" style="color:var(--neon-cyan)">Subject</h3>
        <h2 id="question-text" style="margin: 15px 0;">Loading...</h2>
        <div id="options-container"></div>
        <button class="btn-primary" id="next-btn" onclick="nextQuestion()">Next Question ›</button>
    </div>

    <div id="result-area" class="hidden">
        <h1 style="text-align:center">Result 🎉</h1>
        <p id="user-score-display" style="text-align:center; font-size: 1.5rem; color: var(--neon-green); margin: 10px 0;"></p>
        
        <button class="btn-primary btn-share" onclick="shareResult()">WhatsApp par Share karein 📲</button>

        <div class="leaderboard-box">
            <h3 style="color: var(--neon-cyan); margin-bottom: 10px;">🏆 Top 10 Leaders</h3>
            <div id="leaderboard-list"></div>
        </div>
        <button class="btn-primary" style="background:#444; color:white" onclick="location.reload()">Back to Home</button>
    </div>
</div>

<script>
    let userData = {};
    let currentQ = 0;
    let score = 0;
    let selectedIdx = null;
    let startTime;

    const questions = [
        { sub: "Physics", q: "Light year is a unit of?", opts: ["Time", "Distance", "Speed", "Intensity"], ans: 1 },
        { sub: "Chemistry", q: "Chemical formula of Salt is?", opts: ["HCl", "NaOH", "NaCl", "KCl"], ans: 2 },
        { sub: "Maths", q: "Value of sin(90°)?", opts: ["0", "1", "1/2", "Not defined"], ans: 1 }
    ];

    function startQuiz() {
        userData.name = document.getElementById('user-name').value;
        userData.state = document.getElementById('user-state').value;
        userData.district = document.getElementById('user-district').value;

        if(!userData.name || !userData.state) return alert("Details bhariye!");

        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-container').style.display = 'block';
        startTime = Date.now();
        loadQ();
    }

    function loadQ() {
        const data = questions[currentQ];
        document.getElementById('subject-tag').textContent = data.sub;
        document.getElementById('question-text').textContent = data.q;
        const optsDiv = document.getElementById('options-container');
        optsDiv.innerHTML = '';

        data.opts.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            btn.onclick = () => {
                document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedIdx = i;
            };
            optsDiv.appendChild(btn);
        });
    }

    function nextQuestion() {
        if(selectedIdx === null) return alert("Select an option!");
        if(selectedIdx === questions[currentQ].ans) score++;
        
        selectedIdx = null;
        currentQ++;

        if(currentQ < questions.length) loadQ();
        else finalizeResults();
    }

    function finalizeResults() {
        const timeTaken = ((Date.now() - startTime) / 1000).toFixed(2);
        document.getElementById('quiz-area').classList.add('hidden');
        document.getElementById('result-area').classList.remove('hidden');
        document.getElementById('user-score-display').textContent = `Score: ${score}/3 (${timeTaken}s)`;

        // --- DATABASE LOGIC (Local Browser Storage) ---
        let allScores = JSON.parse(localStorage.getItem('jeeGlobalScores')) || [];
        
        // Naya result add karein
        allScores.push({
            name: userData.name,
            location: `${userData.district}, ${userData.state}`,
            score: score,
            time: parseFloat(timeTaken)
        });

        // Sorting: Pehle Score (High to Low), phir Time (Low to High)
        allScores.sort((a, b) => b.score - a.score || a.time - b.time);

        // Top 10 rakhein
        allScores = allScores.slice(0, 10);
        localStorage.setItem('jeeGlobalScores', JSON.stringify(allScores));

        displayLeaderboard(allScores);
    }

    function displayLeaderboard(list) {
        const listDiv = document.getElementById('leaderboard-list');
        listDiv.innerHTML = '';
        list.forEach((item, idx) => {
            const row = document.createElement('div');
            row.className = `leaderboard-item rank-${idx+1}`;
            row.innerHTML = `
                <span>${idx+1}. ${item.name} (${item.location})</span>
                <span>${item.score}/3 - ${item.time}s</span>
            `;
            listDiv.appendChild(row);
        });
    }

    function shareResult() {
        const text = `🔥 Maine JEE Daily Quiz mein ${score}/3 score kiya! \n📍 Location: ${userData.district}\n\nKya tum mujhse aage nikal sakte ho? Check here: ${window.location.href}`;
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank');
    }
</script>

</body>
</html>
