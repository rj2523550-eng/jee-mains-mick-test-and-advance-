<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rank Prediction | JEE Master Hub</title>
    <style>
        :root { --blue: #003366; --red: #A0050D; --light: #f4f7f9; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--light); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; border-top: 8px solid var(--red); }
        h1 { color: var(--blue); margin-bottom: 5px; }
        .date { color: #888; font-size: 0.8rem; margin-bottom: 20px; }
        .percentile-circle { width: 150px; height: 150px; border-radius: 50%; border: 10px solid #eee; border-top-color: var(--red); margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .perc-val { font-size: 2.2rem; font-weight: bold; color: var(--blue); }
        .score-info { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 25px; }
        .score-info b { color: var(--red); font-size: 1.2rem; }
        .btn { background: var(--blue); color: white; padding: 12px 25px; text-decoration: none; border-radius: 30px; font-weight: bold; display: inline-block; transition: 0.3s; }
        .btn:hover { background: var(--red); transform: translateY(-2px); }
        #no-data { display: none; }
    </style>
</head>
<body>

    <div class="card" id="result-card">
        <h1>Your Prediction</h1>
        <p class="date" id="display-date">Date: --/--/----</p>
        
        <div class="percentile-circle">
            <span class="perc-val" id="display-perc">0%</span>
            <small style="color:#888">Percentile</small>
        </div>
        
        <div class="score-info">
            Your Last Score: <b id="display-score">0</b> / 300
        </div>
        
        <p id="feedback" style="font-size: 0.9rem; color: #555; margin-bottom: 25px;"></p>
        
        <a href="index.html" class="btn">Take Another Test</a>
    </div>

    <div class="card" id="no-data">
        <h1>No Data Found!</h1>
        <p>Aapne abhi tak koi Mock Test nahi diya hai.</p>
        <br>
        <a href="index.html" class="btn">Go to Test Section</a>
    </div>

    <script>
        // 1. Phone ki memory (LocalStorage) se data mangwana
        const score = localStorage.getItem('jee_last_score');
        const date = localStorage.getItem('jee_test_date');

        if (score !== null) {
            // 2. Percentile calculate karna (Formula: Score/300 * 100)
            let percentile = ((parseInt(score) / 300) * 100).toFixed(2);
            
            // 3. UI mein data set karna
            document.getElementById('display-perc').innerText = percentile + "%";
            document.getElementById('display-score').innerText = score;
            document.getElementById('display-date').innerText = "Test Date: " + date;

            // 4. Feedback Logic
            let msg = "";
            if(percentile > 95) msg = "Excellent! You are in the top tier.";
            else if(percentile > 80) msg = "Very Good! Focus on weak topics to reach 99.";
            else msg = "Good start! Practice more Mock Tests daily.";
            document.getElementById('feedback').innerText = msg;

        } else {
            // Agar score nahi hai toh error card dikhao
            document.getElementById('result-card').style.display = 'none';
            document.getElementById('no-data').style.display = 'block';
        }
    </script>
</body>
</html>
