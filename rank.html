<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEE Main 2026 Rank Predictor (Session 1)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #ff5722; --dark: #1a1a1a; --gray: #f4f4f9; }
        body { font-family: 'Inter', sans-serif; background-color: var(--gray); margin: 0; padding: 20px; color: var(--dark); }
        .wrapper { max-width: 600px; margin: 40px auto; background: #fff; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); overflow: hidden; }
        .top-bar { background: var(--brand); color: #fff; padding: 30px; text-align: center; }
        .top-bar h1 { margin: 0; font-size: 24px; text-transform: uppercase; letter-spacing: 1px; }
        .form-body { padding: 40px; }
        .input-box { margin-bottom: 25px; }
        label { display: block; font-weight: 600; margin-bottom: 10px; font-size: 14px; color: #555; }
        input, select { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; font-size: 16px; transition: 0.4s; box-sizing: border-box; }
        input:focus { border-color: var(--brand); outline: none; background: #fffdfb; }
        .btn-predict { width: 100%; background: var(--brand); color: #fff; padding: 16px; border: none; border-radius: 12px; font-size: 18px; font-weight: 800; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(255, 87, 34, 0.3); }
        .btn-predict:hover { transform: scale(1.02); background: #e64a19; }
        
        #result { display: none; margin-top: 30px; padding: 25px; background: #fff9f7; border: 2px dashed var(--brand); border-radius: 15px; text-align: center; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .rank-num { font-size: 42px; color: var(--brand); font-weight: 800; margin: 10px 0; }
        .badge { display: inline-block; padding: 5px 15px; background: #ffe0d6; color: var(--brand); border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="top-bar">
        <h1>JEE 2026 Predictor</h1>
        <p style="margin: 5px 0 0; font-size: 14px; opacity: 0.9;">Session 1: Jan 2026 Analysis</p>
    </div>

    <div class="form-body">
        <div class="input-box">
            <label>Apni Percentile Dalein</label>
            <input type="number" id="perc" placeholder="E.g. 99.25" step="any">
        </div>

        <div class="input-box">
            <label>Shift ki Difficulty Level</label>
            <select id="difficulty">
                <option value="1">Moderate (Balanced)</option>
                <option value="1.05">Easy (High Competition)</option>
                <option value="0.95">Hard (Bonus for Accuracy)</option>
            </select>
        </div>

        <div class="input-box">
            <label>Category</label>
            <select id="cat">
                <option value="GEN">General</option>
                <option value="OBC">OBC-NCL</option>
                <option value="SC">SC</option>
                <option value="ST">ST</option>
                <option value="EWS">EWS</option>
            </select>
        </div>

        <button class="btn-predict" onclick="getRank()">RANK CHECK KAREIN</button>

        <div id="result">
            <span class="badge" id="shiftInfo">MODERATE SHIFT</span>
            <div>Aapki Expected AIR Rank:</div>
            <div class="rank-num" id="rankOutput">--</div>
            <p style="font-size: 12px; color: #888;">*Predicted based on 1.25 Million unique candidates for 2026.</p>
        </div>
    </div>
</div>

<script>
function getRank() {
    const p = parseFloat(document.getElementById('perc').value);
    const diff = parseFloat(document.getElementById('difficulty').value);
    const res = document.getElementById('result');
    
    if(!p || p < 0 || p > 100) {
        alert("Sahi percentile enter karein!");
        return;
    }

    // 2026 Total Candidate Projection
    const total = 1250000;
    
    // Core Formula with Difficulty Multiplier
    let baseRank = ((100 - p) * total) / 100;
    let finalRank = Math.floor(baseRank * diff) + 1;

    // Display Logic
    res.style.display = 'block';
    document.getElementById('rankOutput').innerText = "#" + finalRank.toLocaleString();
    
    const diffText = document.getElementById('difficulty').options[document.getElementById('difficulty').selectedIndex].text;
    document.getElementById('shiftInfo').innerText = diffText.toUpperCase();

    res.scrollIntoView({ behavior: 'smooth' });
}
</script>

</body>
</html>
