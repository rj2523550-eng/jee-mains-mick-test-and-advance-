<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rank Prediction Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f9; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .input-section { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; background: #eee; padding: 15px; border-radius: 8px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #218838; }
        .chart-container { position: relative; height: 400px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📈 Test Rank Analytics (Market View)</h2>
    
    <div class="input-section">
        <input type="date" id="testDate" required>
        <input type="number" id="testRank" placeholder="Apni Rank Likho" required>
        <button onclick="addData()">Test Add Karein</button>
    </div>

    <div class="chart-container">
        <canvas id="rankChart"></canvas>
    </div>

    <p style="font-size: 0.9em; color: #666; text-align: center;">
        * Sirf last 30 tests ka data dikhega. Naya test aane par purana delete ho jayega.
    </p>
</div>

<script>
    let myChart;
    const MAX_DATA_POINTS = 30;

    // 1. Local Storage se data uthana
    function getStoredData() {
        const data = localStorage.getItem('rankData');
        return data ? JSON.parse(data) : [];
    }

    // 2. Data save karna aur 30 ki limit lagana
    function addData() {
        const dateInput = document.getElementById('testDate').value;
        const rankInput = document.getElementById('testRank').value;

        if (!dateInput || !rankInput) {
            alert("Please date aur rank dono bharein!");
            return;
        }

        let history = getStoredData();

        // Naya data object
        const newEntry = {
            date: dateInput,
            rank: parseInt(rankInput)
        };

        history.push(newEntry);

        // Agar 30 se zyada ho jaye, toh sabse purana (index 0) hata do
        if (history.length > MAX_DATA_POINTS) {
            history.shift(); 
        }

        localStorage.setItem('rankData', JSON.stringify(history));
        updateChart();
        
        // Reset inputs
        document.getElementById('testRank').value = '';
    }

    // 3. Chart Update Function (Share Market Style)
    function updateChart() {
        const history = getStoredData();
        const labels = history.map(item => item.date);
        const ranks = history.map(item => item.rank);

        const ctx = document.getElementById('rankChart').getContext('2d');

        if (myChart) {
            myChart.destroy(); // Purane chart ko khatam karke naya banayein
        }

        myChart = new Chart(ctx, {
            type: 'line', // 'line' chart market trend dikhane ke liye best hai
            data: {
                labels: labels,
                datasets: [{
                    label: 'Rank Position',
                    data: ranks,
                    borderColor: '#007bff',
                    backgroundColor: 'rgba(0, 123, 255, 0.1)',
                    borderWidth: 3,
                    tension: 0.3, // Curve smoothness
                    fill: true,
                    pointRadius: 5,
                    pointBackgroundColor: '#fff',
                    pointBorderColor: '#007bff'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        reverse: true, // Rank mein hamesha 1 upar hota hai, isliye reverse
                        beginAtZero: false,
                        title: { display: true, text: 'Rank' }
                    },
                    x: {
                        title: { display: true, text: 'Test Date' }
                    }
                },
                plugins: {
                    tooltip: {
                        mode: 'index',
                        intersect: false
                    }
                }
            }
        });
    }

    // Page load hone par chart dikhayein
    window.onload = updateChart;
</script>

</body>
</html>
