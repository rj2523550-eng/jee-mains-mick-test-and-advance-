<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily DPP | JEE Master Hub</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --p: #003366; --bg: #f4f7f9; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 15px; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; }
        
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 18px; border-radius: 25px; border: none; background: #e0e0e0; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .active-tab { background: var(--p); color: white; box-shadow: 0 4px 10px rgba(0,51,102,0.2); }

        .add-card { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-bottom: 25px; }
        textarea { width: 100%; height: 110px; border: 2px solid #eee; border-radius: 15px; padding: 15px; box-sizing: border-box; resize: none; margin-bottom: 12px; outline: none; transition: 0.3s; }
        textarea:focus { border-color: var(--p); }
        
        .btn-post { background: var(--p); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; }
        
        .q-card { background: white; border-radius: 18px; padding: 20px; margin-bottom: 15px; text-align: left; border-left: 6px solid var(--p); box-shadow: 0 5px 15px rgba(0,0,0,0.04); }
        .subject-tag { font-size: 10px; text-transform: uppercase; color: var(--p); font-weight: bold; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: var(--p);"><i class="fas fa-rocket"></i> Daily DPP Challenge</h2>

    <div class="tabs">
        <button class="tab-btn active-tab" onclick="switchSub('Physics', this)">Physics</button>
        <button class="tab-btn" onclick="switchSub('Chemistry', this)">Chemistry</button>
        <button class="tab-btn" onclick="switchSub('Maths', this)">Maths</button>
    </div>

    <div class="add-card">
        <textarea id="qInput" placeholder="Enter question for current subject..."></textarea>
        <button class="btn-post" id="postBtn" onclick="saveDPP()">🚀 Add to DPP</button>
    </div>

    <div id="loader" style="margin: 20px;">Fetching latest questions...</div>
    <div id="displayArea"></div>
</div>

<script>
    const API = "https://sheetdb.io/api/v1/pqdhac1zdqmck";
    let currentSubject = "Physics";

    function switchSub(sub, btn) {
        currentSubject = sub;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
        btn.classList.add('active-tab');
        loadDPP();
    }

    async function saveDPP() {
        const text = document.getElementById('qInput').value.trim();
        const btn = document.getElementById('postBtn');
        if(!text) return alert("Bhai, sawal toh likho!");

        btn.disabled = true;
        btn.innerText = "Adding...";

        // 1. Pura data fetch karo
        const res = await fetch(API);
        let allData = await res.json();
        
        // 2. Sirf DPP aur CURRENT SUBJECT wale filter karo
        let subDPP = allData.filter(item => item.category === "DPP" && item.subject === currentSubject);

        // 3. 10 Question ki limit (Oldest delete)
        if(subDPP.length >= 10) {
            const oldId = subDPP[0].id; // Sabse purana
            await fetch(`${API}/id/${oldId}`, { method: 'DELETE' });
        }

        // 4. Naya question add karo (CATEGORY "DPP" ke sath)
        const newData = {
            "id": "DPP_" + Date.now(),
            "question": text,
            "subject": currentSubject,
            "category": "DPP", // Yeh filters ke liye zaruri hai
            "votes": 0
        };

        await fetch(API, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ data: [newData] })
        });

        document.getElementById('qInput').value = "";
        btn.disabled = false;
        btn.innerText = "🚀 Add to DPP";
        loadDPP();
    }

    async function loadDPP() {
        const area = document.getElementById('displayArea');
        document.getElementById('loader').style.display = 'block';
        area.innerHTML = "";

        try {
            const res = await fetch(API);
            const data = await res.json();
            document.getElementById('loader').style.display = 'none';

            // SIRF DPP aur CURRENT SUBJECT wale dikhao
            const filtered = data.filter(item => item.category === "DPP" && item.subject === currentSubject).reverse();

            filtered.forEach(item => {
                area.innerHTML += `
                    <div class="q-card">
                        <span class="subject-tag">${item.subject}</span>
                        <div class="mathjax-content">${item.question}</div>
                        <div style="margin-top:12px; display:flex; gap:15px; font-size:12px; color:#888;">
                            <span><i class="far fa-thumbs-up"></i> Relevant</span>
                            <span><i class="far fa-thumbs-down"></i> Irrelevant</span>
                        </div>
                    </div>
                `;
            });

            if (window.MathJax) MathJax.typesetPromise();
        } catch(e) { area.innerHTML = "Error loading data."; }
    }

    loadDPP();
</script>

<script src="chatbot.js"></script>
</body>
</html>
