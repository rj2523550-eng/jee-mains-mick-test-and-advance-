<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily DPP | JEE Master Hub</title>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$']],
                processEscapes: true
            },
            options: {
                processHtmlClass: 'mathjax-render'
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --p: #003366; --bg: #f0f4f8; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; text-align: center; }
        .header-box { background: linear-gradient(135deg, var(--p), #0056b3); color: white; padding: 25px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 18px; border-radius: 25px; border: none; background: white; color: var(--p); cursor: pointer; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .active-tab { background: var(--p); color: white; transform: scale(1.05); }
        .add-card { background: white; padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 25px; }
        textarea { width: 100%; height: 110px; border: 2px solid #f0f0f0; border-radius: 15px; padding: 15px; box-sizing: border-box; resize: none; font-size: 15px; outline: none; transition: 0.3s; }
        textarea:focus { border-color: var(--p); }
        .btn-post { background: var(--p); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; font-size: 16px; }
        .q-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; text-align: left; border-left: 6px solid var(--p); box-shadow: 0 5px 15px rgba(0,0,0,0.03); }
        .sub-tag { font-size: 10px; font-weight: bold; color: var(--p); text-transform: uppercase; margin-bottom: 8px; display: block; }
        .mathjax-render { font-size: 16px; color: #333; line-height: 1.6; overflow-x: auto; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <h2 style="margin:0;"><i class="fas fa-edit"></i> Daily DPP</h2>
        <p style="font-size:12px; opacity:0.9; margin-top:5px;">Physics & Chemistry Formula Fixer Active</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active-tab" onclick="changeSub('Physics', this)">Physics</button>
        <button class="tab-btn" onclick="changeSub('Chemistry', this)">Chemistry</button>
        <button class="tab-btn" onclick="changeSub('Maths', this)">Maths</button>
    </div>

    <div class="add-card">
        <textarea id="dppInput" placeholder="Sawal likhein... (Example: \gamma = C_p/C_v)"></textarea>
        <button class="btn-post" id="postBtn" onclick="saveDPP()">🚀 Add Question</button>
    </div>

    <div id="loader" style="font-weight:bold; color:var(--p);">Updating DPP...</div>
    <div id="dppDisplay"></div>
</div>

<script>
    const API = "https://sheetdb.io/api/v1/mtmmrqc4aq4bq"; 
    let currentSub = "Physics";

    function changeSub(sub, btn) {
        currentSub = sub;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
        btn.classList.add('active-tab');
        loadDPP();
    }

    // --- Formula Fixer Logic ---
    function formatFormula(text) {
        // Agar text mein math symbols hain aur $ nahi hai, toh automatic $ add kar do
        if ((text.includes('\\') || text.includes('_') || text.includes('^')) && !text.includes('$')) {
            return `$${text}$`;
        }
        return text;
    }

    async function saveDPP() {
        const rawText = document.getElementById('dppInput').value.trim();
        const btn = document.getElementById('postBtn');
        if(!rawText) return alert("Kuch toh likho!");

        btn.disabled = true;
        btn.innerText = "Processing...";

        // Step 1: Fix Formula before saving
        const text = formatFormula(rawText);

        try {
            const res = await fetch(API);
            const allData = await res.json();
            const subData = allData.filter(i => i.subject === currentSub);

            // 10 Question Limit
            if(subData.length >= 10) {
                const oldestId = subData[0].id;
                await fetch(`${API}/id/${oldestId}`, { method: 'DELETE' });
            }

            // Post New Question
            await fetch(API, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ data: [{ "id": "Q_"+Date.now(), "question": text, "subject": currentSub, "likes": 0, "dislikes": 0 }] })
            });

            document.getElementById('dppInput').value = "";
            loadDPP();
        } catch(e) { alert("Error saving data!"); }
        btn.disabled = false;
        btn.innerText = "🚀 Add Question";
    }

    async function loadDPP() {
        const display = document.getElementById('dppDisplay');
        document.getElementById('loader').style.display = "block";
        display.innerHTML = "";

        try {
            const res = await fetch(API);
            const data = await res.json();
            document.getElementById('loader').style.display = "none";

            const filtered = data.filter(i => i.subject === currentSub).reverse();

            filtered.forEach(item => {
                display.innerHTML += `
                    <div class="q-card">
                        <span class="sub-tag">${item.subject}</span>
                        <div class="mathjax-render">${item.question}</div>
                    </div>
                `;
            });

            // Re-render MathJax
            if (window.MathJax) {
                MathJax.typesetPromise([display]).catch((err) => console.log(err));
            }
        } catch(e) { display.innerHTML = "Sheet API Error!"; }
    }

    loadDPP();
</script>

<script src="chatbot.js"></script>
</body>
</html>
