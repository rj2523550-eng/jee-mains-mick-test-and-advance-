<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily DPP | JEE Master Hub</title>
    
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], processEscapes: true },
            options: { processHtmlClass: 'math-render' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --p: #003366; --bg: #f0f4f8; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 10px; line-height: 1.6; }
        .container { max-width: 550px; margin: 0 auto; text-align: center; }
        
        /* Header Section */
        .header-box { background: linear-gradient(135deg, var(--p), #0056b3); color: white; padding: 25px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .header-box h2 { margin: 0; font-size: 24px; }
        .info-text { font-size: 13px; margin-top: 10px; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; line-height: 1.4; }

        /* Tabs */
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; border-radius: 25px; border: none; background: white; cursor: pointer; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .active-tab { background: var(--p); color: white; }

        /* Input Card */
        .add-card { background: white; padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 25px; }
        textarea { width: 100%; height: 120px; border: 2px solid #f0f0f0; border-radius: 15px; padding: 15px; box-sizing: border-box; resize: none; font-size: 15px; outline: none; transition: 0.3s; }
        textarea:focus { border-color: var(--p); }
        .btn-post { background: var(--p); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; font-size: 16px; }

        /* Question Cards (Fixed Layout) */
        .q-card { 
            background: white; 
            border-radius: 15px; 
            padding: 20px; 
            margin-bottom: 20px; 
            text-align: left; 
            border-left: 6px solid var(--p); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            word-wrap: break-word; /* Long text fix */
            overflow-wrap: break-word;
        }
        .sub-tag { font-size: 10px; font-weight: bold; color: var(--p); text-transform: uppercase; margin-bottom: 8px; display: block; }
        .math-render { font-size: 15px; color: #333; line-height: 1.7; display: block; }
        
        .vote-bar { display: flex; gap: 20px; margin-top: 15px; border-top: 1px solid #f0f0f0; padding-top: 12px; font-size: 13px; color: #666; }
        .vote-btn { cursor: pointer; transition: 0.2s; }
        .vote-btn:hover { color: var(--p); }

        #loader { font-weight: bold; color: var(--p); margin: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <h2><i class="fas fa-layer-group"></i> Daily DPP</h2>
        <div class="info-text">
            <b>Student Power:</b> Aap khud 1 question DPP mein likh sakte hain jise saare students solve kar sakein. Aap hi DPP banaoge aur dusre solve karenge! 🚀
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active-tab" onclick="changeSub('Physics', this)">Physics</button>
        <button class="tab-btn" onclick="changeSub('Chemistry', this)">Chemistry</button>
        <button class="tab-btn" onclick="changeSub('Maths', this)">Maths</button>
    </div>

    <div class="add-card">
        <textarea id="dppInput" placeholder="Apna JEE question likhein... (Math/Phy symbols ke liye \ use karein)"></textarea>
        <button class="btn-post" id="postBtn" onclick="saveDPP()">🚀 Add to Daily DPP</button>
    </div>

    <div id="loader">Fetching Community DPP...</div>
    <div id="dppDisplay"></div>
</div>

<script>
    const API = "https://sheetdb.io/api/v1/mtmmrqc4aq4bq"; 
    let currentSub = "Physics";

    function changeSub(sub, btn) {
        currentSub = sub;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
        btn.classList.add('active-tab');
        loadDPP();
    }

    async function saveDPP() {
        const rawText = document.getElementById('dppInput').value.trim();
        const btn = document.getElementById('postBtn');
        if(!rawText) return alert("Bhai, sawal toh likho!");

        btn.disabled = true;
        btn.innerText = "Adding...";

        // Auto-fix symbols (\ Pa, \gamma etc)
        let finalText = rawText;
        if ((finalText.includes('\\') || finalText.includes('_')) && !finalText.includes('$')) {
            finalText = `$${finalText}$`;
        }

        try {
            const res = await fetch(API);
            const allData = await res.json();
            const subData = allData.filter(i => i.subject === currentSub);

            if(subData.length >= 10) {
                await fetch(`${API}/id/${subData[0].id}`, { method: 'DELETE' });
            }

            await fetch(API, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ data: [{ "id": "Q_"+Date.now(), "question": finalText, "subject": currentSub, "likes": 0 }] })
            });

            document.getElementById('dppInput').value = "";
            loadDPP();
        } catch(e) { alert("Error!"); }
        btn.disabled = false;
        btn.innerText = "🚀 Add to Daily DPP";
    }

    async function loadDPP() {
        const display = document.getElementById('dppDisplay');
        document.getElementById('loader').style.display = "block";
        display.innerHTML = "";

        try {
            const res = await fetch(API);
            const data = await res.json();
            document.getElementById('loader').style.display = "none";

            const filtered = data.filter(i => i.subject === currentSub).reverse();

            filtered.forEach(item => {
                display.innerHTML += `
                    <div class="q-card">
                        <span class="sub-tag">${item.subject}</span>
                        <div class="math-render"><b>Q:</b> ${item.question}</div>
                        <div class="vote-bar">
                            <span class="vote-btn" onclick="vote('${item.id}', ${item.likes || 0})"><i class="far fa-thumbs-up"></i> Relevant (${item.likes || 0})</span>
                            <span class="vote-btn"><i class="far fa-comment"></i> Solve</span>
                            <span class="vote-btn"><i class="fas fa-share-alt"></i> Share</span>
                        </div>
                    </div>
                `;
            });

            if (window.MathJax) MathJax.typesetPromise();
        } catch(e) { display.innerHTML = "API Error!"; }
    }

    async function vote(id, current) {
        alert("Upvoted! 👍");
        await fetch(`${API}/id/${id}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ data: { "likes": parseInt(current) + 1 } })
        });
        loadDPP();
    }

    loadDPP();
</script>

<script src="chatbot.js"></script>
</body>
</html>
