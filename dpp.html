<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Daily DPP | JEE Master Hub</title>
    
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { 
            --primary: #003366; 
            --accent: #00d2ff;
            --bg: #f8f9fc; 
            --white: #ffffff; 
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100-vh;
            padding: 20px;
        }

        .container { 
            width: 100%;
            max-width: 450px; 
            animation: fadeIn 0.5s ease-in-out;
        }

        /* Glassmorphism Card Design */
        .add-card { 
            background: var(--white); 
            padding: 30px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0, 51, 102, 0.1); 
            text-align: center;
            border: 1px solid rgba(0, 51, 102, 0.05);
        }

        .icon-circle {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 30px;
            box-shadow: 0 10px 20px rgba(0, 51, 102, 0.2);
        }

        h2 { color: var(--primary); margin: 0 0 10px 0; font-size: 22px; }
        p { color: #777; font-size: 14px; margin-bottom: 25px; }

        textarea { 
            width: 100%; 
            height: 150px; 
            border: 2px solid #eee; 
            border-radius: 15px; 
            padding: 15px; 
            box-sizing: border-box; 
            resize: none; 
            font-size: 16px; 
            outline: none;
            transition: 0.3s;
            background: #fafafa;
        }

        textarea:focus { 
            border-color: var(--primary); 
            background: #fff;
            box-shadow: 0 0 10px rgba(0, 51, 102, 0.05);
        }

        .btn-submit { 
            background: linear-gradient(90deg, var(--primary), #0056b3); 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 16px;
            cursor: pointer; 
            width: 100%; 
            margin-top: 20px; 
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-submit:hover { 
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0, 51, 102, 0.2);
        }

        .btn-submit:active { transform: translateY(0); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Math Preview Tooltip */
        .hint {
            font-size: 11px;
            color: #aaa;
            margin-top: 8px;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="add-card">
        <div class="icon-circle">
            <i class="fas fa-plus"></i>
        </div>
        <h2>Create Daily DPP</h2>
        <p>Apna JEE challenge yahan add karein</p>

        <textarea id="dppText" placeholder="Example: Find the value of $\int e^x dx$ ..."></textarea>
        
        <div class="hint">
            <i class="fas fa-info-circle"></i> Use <b>$ formula $</b> for better display.
        </div>

        <button class="btn-submit" id="submitBtn" onclick="sendDPP()">
            <i class="fas fa-paper-plane"></i> Add Question
        </button>
    </div>
</div>

<script>
    const API_DPP = "https://sheetdb.io/api/v1/pqdhac1zdqmck"; 

    async function sendDPP() {
        const qText = document.getElementById('dppText').value.trim();
        const btn = document.getElementById('submitBtn');

        if(!qText) {
            alert("Bhai, kuch likho toh sahi!");
            return;
        }

        // Visual feedback
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Posting...';

        const data = {
            "id": "DPP_" + Date.now(),
            "question": qText,
            "votes": 0,
            "badge": "Community DPP",
            "type": "DPP"
        };

        try {
            const response = await fetch(API_DPP, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ data: [data] })
            });

            if(response.ok) {
                alert("Zabardast! DPP add ho gaya. 🚀");
                document.getElementById('dppText').value = "";
            }
        } catch(error) {
            alert("Error: Network check karein!");
        }

        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane"></i> Add Question';
    }
</script>

<script src="chatbot.js"></script>

</body>
</html>
