<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEE Weekly Test - NTA Pattern</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --nta-blue: #2c3e50;
            --nta-gray: #f4f7f6;
            --ans-green: #27ae60;
            --not-ans-red: #e74c3c;
            --not-visited: #ecf0f1;
            --whatsapp: #25D366;
            --notice-yellow: #fff3cd;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background-color: var(--nta-gray); height: 100vh; overflow: hidden; }

        /* --- LOGIN --- */
        #login-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-card { background: white; padding: 30px; border-radius: 8px; width: 380px; text-align: center; border-top: 5px solid var(--nta-blue); }
        .login-card input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; }
        
        /* Desktop Mode Notice */
        .desktop-notice { 
            background: var(--notice-yellow); 
            color: #856404; 
            padding: 10px; 
            border-radius: 5px; 
            margin-bottom: 15px; 
            font-size: 0.85rem; 
            border: 1px solid #ffeeba;
            font-weight: 500;
        }

        .btn-start { background: #3498db; color: white; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 4px; }

        /* --- HEADER --- */
        header { background: white; border-bottom: 1px solid #ddd; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; height: 60px; }
        .timer { font-size: 1.2rem; font-weight: bold; color: #e67e22; background: #fff8f0; padding: 5px 15px; border-radius: 4px; border: 1px solid #f39c12; }

        /* --- TEST LAYOUT --- */
        .container { display: flex; height: calc(100vh - 60px); }
        .question-panel { flex: 3; background: white; padding: 30px; overflow-y: auto; border-right: 1px solid #ddd; }
        .subject-tag { background: var(--nta-blue); color: white; padding: 5px 15px; border-radius: 3px; font-size: 0.85rem; margin-bottom: 15px; display: inline-block; }
        .q-text { font-size: 1.1rem; line-height: 1.5; margin-bottom: 20px; color: #2c3e50; }
        
        .option { display: block; padding: 12px; border: 1px solid #eee; margin-bottom: 8px; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 0.95rem; }
        .option:hover { background: #f8f9fa; }
        .option.selected { background: #e1f5fe; border-color: #03a9f4; font-weight: bold; }

        /* New Button Positioning: Directly under options */
        .inline-nav { margin-top: 25px; padding-top: 20px; border-top: 1px solid #eee; display: flex; gap: 15px; }
        .btn-nav { padding: 12px 30px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; flex: 1; }
        .btn-save { background: var(--ans-green); color: white; }
        .btn-clear { background: #bdc3c7; color: #333; }

        /* --- SIDE PALETTE --- */
        .side-panel { flex: 1; background: #fff; padding: 20px; overflow-y: auto; }
        .palette-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px; }
        .p-box { height: 38px; width: 38px; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; cursor: pointer; background: var(--not-visited); }
        
        .p-box.answered { background: var(--ans-green); color: white; border: none; clip-path: polygon(0% 20%, 20% 0%, 80% 0%, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0% 80%); }
        .p-box.not-answered { background: var(--not-ans-red); color: white; border: none; border-radius: 50% 50% 0 0; }
        .p-box.active { border: 2px solid #3498db; box-shadow: 0 0 5px rgba(52, 152, 219, 0.5); }

        /* --- RESULTS --- */
        .result-overlay { position: fixed; inset: 0; background: white; z-index: 2000; padding: 40px; overflow-y: auto; display: none; }
        .score-banner { background: #e8f5e9; padding: 25px; border-radius: 10px; text-align: center; border: 1px solid #c8e6c9; margin-bottom: 25px; }
        .sol-card { background: #fff; border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid var(--nta-blue); }
        .btn-whatsapp { background: var(--whatsapp); color: white; padding: 15px; border-radius: 8px; text-decoration: none; display: flex; align-items: center; gap: 10px; font-weight: bold; justify-content: center; margin-bottom: 20px; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2 style="margin-bottom:10px; color:var(--nta-blue)">Weekly Test (30 Qs)</h2>
        
        <div class="desktop-notice">
            ⚠️ <b>Notice:</b> Agar aap mobile se test de rahe hain, toh behtar experience ke liye <b>"Desktop Mode"</b> on karein.
        </div>

        <input type="text" id="u-name" placeholder="Full Name">
        <input type="text" id="u-state" placeholder="State">
        <input type="text" id="u-dist" placeholder="District">
        <button class="btn-start" onclick="beginTest()">Start Weekly Test 🔥</button>
    </div>
</div>

<header>
    <div id="user-info" style="font-weight:bold; color:var(--nta-blue)">NTA MOCK TEST</div>
    <div class="timer" id="timer-box">60:00</div>
</header>

<div class="container" id="test-view" style="display: none;">
    <div class="question-panel">
        <div class="subject-tag" id="sub-tag">Subject</div>
        <div class="q-text" id="q-body">Question loading...</div>
        <div id="opt-container"></div>
        
        <div class="inline-nav">
            <button class="btn-nav btn-clear" onclick="clearAns()">Clear Response</button>
            <button class="btn-nav btn-save" onclick="saveNext()">Save & Next</button>
        </div>
    </div>

    <div class="side-panel">
        <h4 style="color:#555">Question Palette</h4>
        <div class="palette-grid" id="p-grid"></div>
        <button class="btn-start" style="margin-top: 30px; background: var(--not-ans-red);" onclick="submitConfirm()">Submit Test</button>
    </div>
</div>

<div class="result-overlay" id="result-view">
    <div class="score-banner">
        <h1>Test Summary</h1>
        <h2 style="color:var(--ans-green); margin:10px 0;">Final Score: <span id="final-score">0</span> / 120</h2>
        <p id="user-details" style="color:#666"></p>
    </div>

    <a href="javascript:void(0)" class="btn-whatsapp" onclick="shareTest()">Share Result on WhatsApp 📲</a>

    <h3 style="margin-bottom: 15px; border-bottom: 2px solid var(--nta-blue); padding-bottom: 5px;">Detailed Solutions 💡</h3>
    <div id="solutions-box"></div>

    <button class="btn-start" style="background:#333; margin-top:20px" onclick="location.reload()">Return to Dashboard</button>
</div>

<script>
    // [Questions Data Remains the Same as previously provided]
    let questions = [
        { sub: "Physics", q: "If force (F), velocity (V), and time (T) are taken as fundamental units, then the dimensions of mass (M) are:", opts: ["[F V T⁻¹]", "[F V⁻¹ T⁻¹]", "[F V⁻¹ T]", "[F V⁻² T]"], ans: 2, exp: "Since F = ma = m(v/t), then m = F · t · v⁻¹. So, [M] = [F V⁻¹ T]." },
        { sub: "Physics", q: "A ball is thrown vertically upwards with a velocity of 20 m/s from the top of a tower of height 25 m. After how many seconds will the ball hit the ground? (g = 10 m/s²)", opts: ["5 s", "3 s", "4 s", "6 s"], ans: 0, exp: "Using s = ut + ½at² with displacement s = -25 m, u = 20 m/s, and a = -10 m/s². The quadratic equation -25 = 20t - 5t² simplifies to t² - 4t - 5 = 0. Solving gives t = 5 s." },
        { sub: "Physics", q: "A block of mass 5 kg is placed on a rough horizontal surface with μ = 0.6. If a horizontal force of 20 N is applied, the friction force acting is:", opts: ["30 N", "20 N", "10 N", "Zero"], ans: 1, exp: "The maximum static friction f_max = μmg = 30 N. Since the applied force (20 N) is less than f_max, the static friction will exactly equal the applied force." },
        { sub: "Physics", q: "A body of mass 2 kg moves such that x = t³/3. The work done by the force in the first 2 seconds is:", opts: ["16 J", "8 J", "4 J", "32 J"], ans: 0, exp: "Velocity v = dx/dt = t². At t=2, v=4 m/s. Work done = Change in Kinetic Energy = ½ * 2 * (16 - 0) = 16 J." },
        { sub: "Physics", q: "Two rings of same mass and radius are placed such that their planes are perpendicular. Moment of inertia passing through center and perpendicular to plane of one of the rings is:", opts: ["MR²", "2MR²", "3/2 MR²", "1/2 MR²"], ans: 2, exp: "For one ring, I₁ = MR². For the other (perpendicular), the axis is a diameter, so I₂ = ½MR². Total I = 3/2 MR²." },
        { sub: "Physics", q: "If Earth shrinks by 1% (mass constant), 'g' on surface will:", opts: ["Increase by 1%", "Decrease by 1%", "Increase by 2%", "Decrease by 2%"], ans: 2, exp: "g = GM/R². Taking logs and differentiating, dg/g = -2dR/R. If R decreases by 1%, g increases by 2%." },
        { sub: "Physics", q: "In adiabatic process, P is found proportional to cube of T. γ (Cp/Cv) for the gas is:", opts: ["4/3", "5/3", "3/2", "2"], ans: 2, exp: "P ∝ T^(γ/γ-1). Given P ∝ T³, so γ/(γ-1) = 3. Solving gives γ = 3/2." },
        { sub: "Physics", q: "A capacitor C is charged to V and then connected to an uncharged 2C in parallel. Final potential difference is:", opts: ["V", "V/2", "V/3", "2V/3"], ans: 2, exp: "Common Potential V' = Total Charge / Total Capacitance = CV / (C + 2C) = V/3." },
        { sub: "Physics", q: "A wire of resistance R is stretched to double its length. New resistance will be:", opts: ["2R", "4R", "R/2", "R/4"], ans: 1, exp: "L' = 2L means A' = A/2. New R = ρ(2L)/(A/2) = 4R." },
        { sub: "Physics", q: "De Broglie wavelength of an electron accelerated through 100 Volts is approx:", opts: ["1.227 Å", "12.27 Å", "0.1227 Å", "122.7 Å"], ans: 0, exp: "λ = 12.27 / √V. For V=100, λ = 12.27 / 10 = 1.227 Å." },

        // CHEMISTRY (11-20)
        { sub: "Chemistry", q: "De Broglie wavelength of 1g particle with velocity 100 m/s is:", opts: ["6.63 x 10⁻³³ m", "6.63 x 10⁻³⁵ m", "6.63 x 10⁻³¹ m", "6.63 x 10⁻³⁰ m"], ans: 0, exp: "λ = h/mv = (6.63e-34)/(10⁻³ * 100) = 6.63 x 10⁻³³ m." },
        { sub: "Chemistry", q: "Which of the following species is diamagnetic in nature?", opts: ["He₂⁺", "O₂", "N₂", "B₂"], ans: 2, exp: "N₂ (14 electrons) has all electrons paired in its molecular orbitals." },
        { sub: "Chemistry", q: "Van't Hoff factor (i) for K₄[Fe(CN)₆] assuming 100% ionization is:", opts: ["2", "4", "5", "3"], ans: 2, exp: "Ionizes into 4K⁺ and 1 [Fe(CN)₆]⁴⁻ ion. Total particles = 5." },
        { sub: "Chemistry", q: "For a first-order reaction, time for 50% completion is 20 min. Time for 75% completion is:", opts: ["30 min", "40 min", "60 min", "80 min"], ans: 1, exp: "t75% = 2 * t50% = 2 * 20 = 40 minutes." },
        { sub: "Chemistry", q: "IUPAC name of [Co(NH₃)₅Cl]Cl₂ is:", opts: ["Pentaamminechloridocobalt(III) chloride", "Chloridopentaamminecobalt(III) chloride", "Pentaamminechloridocobalt(II) chloride", "Cobalt(III) pentaamminechloride"], ans: 0, exp: "Named alphabetically (ammine before chlorido). Oxidation state of Co is +3." },
        { sub: "Chemistry", q: "Which of the following oxoacids of Phosphorus contains a P-P bond?", opts: ["H₄P₂O₇", "H₄P₂O₆", "H₃PO₄", "H₃PO₂"], ans: 1, exp: "H₄P₂O₆ (Hypophosphoric acid) contains a direct P-P bond." },
        { sub: "Chemistry", q: "Major product of Propene with HBr in presence of peroxide is:", opts: ["2-Bromopropane", "1-Bromopropane", "1,2-Dibromopropane", "2-Bromopropene"], ans: 1, exp: "Anti-Markovnikov addition occurs, placing Br on the terminal carbon." },
        { sub: "Chemistry", q: "For a spontaneous process at all temperatures, conditions are:", opts: ["ΔH > 0, ΔS > 0", "ΔH < 0, ΔS < 0", "ΔH < 0, ΔS > 0", "ΔH > 0, ΔS < 0"], ans: 2, exp: "ΔG = ΔH - TΔS. For ΔG to be always negative, ΔH < 0 and ΔS > 0." },
        { sub: "Chemistry", q: "If solubility product (Ksp) of AgCl is 1.0 x 10⁻¹⁰, its solubility is:", opts: ["1.0 x 10⁻⁵ mol/L", "1.0 x 10⁻¹⁰ mol/L", "0.5 x 10⁻⁵ mol/L", "1.0 x 10⁻⁷ mol/L"], ans: 0, exp: "Solubility s = √Ksp = √10⁻¹⁰ = 10⁻⁵ mol/L." },
        { sub: "Chemistry", q: "Which of the following is the most stable carbocation?", opts: ["CH₃⁺", "(CH₃)₂CH⁺", "(CH₃)₃C⁺", "CH₃CH₂⁺"], ans: 2, exp: "Tertiary carbocation (3°) is most stable due to +I and hyperconjugation." },

        // MATHS (21-30)
        { sub: "Mathematics", q: "If f(x) = (x-1)/(x+1), then the value of f(f(x)) is:", opts: ["x", "-1/x", "1/x", "-x"], ans: 1, exp: "Substitute f(x) into itself: [(x-1/x+1)-1] / [(x-1/x+1)+1] = -2/2x = -1/x." },
        { sub: "Mathematics", q: "If ω is imaginary cube root of unity, then (1 + ω - ω²)⁷ is:", opts: ["128ω", "-128ω²", "128ω²", "-128ω"], ans: 1, exp: "(-ω² - ω²)⁷ = (-2ω²)⁷ = -128ω¹⁴ = -128ω²." },
        { sub: "Mathematics", q: "If roots of x² - bx + c = 0 are consecutive integers, then b² - 4c is:", opts: ["0", "1", "2", "3"], ans: 1, exp: "Difference of roots = 1. (√D)/a = 1 => D = 1. So b²-4c=1." },
        { sub: "Mathematics", q: "If A is 3x3 and |A| = 2, then |adj(adj A)| is:", opts: ["2⁴", "2⁸", "2¹⁶", "2²"], ans: 0, exp: "Formula is |A|^((n-1)²). Here 2^(2²) = 2⁴ = 16." },
        { sub: "Mathematics", q: "The value of lim (x→0) (sin x - x)/x³ is:", opts: ["1/3", "-1/3", "1/6", "-1/6"], ans: 3, exp: "Expansion of sin x = x - x³/6. So result is -1/6." },
        { sub: "Mathematics", q: "Value of ∫[0 to π/2] √sin x / (√sin x + √cos x) dx is:", opts: ["π/2", "π/4", "π", "0"], ans: 1, exp: "Property ∫f(x) = ∫f(a-x). 2I = ∫1 dx = π/2, so I = π/4." },
        { sub: "Mathematics", q: "Length of tangent from (5,1) to circle x² + y² + 6x - 4y - 3 = 0 is:", opts: ["7", "√51", "8", "√49"], ans: 0, exp: "L = √S₁ = √(25+1+30-4-3) = √49 = 7." },
        { sub: "Mathematics", q: "If a = 2i-j+k and b = i+2j-3k are perpendicular, dot product is:", opts: ["1", "0", "-1", "5"], ans: 1, exp: "By definition, dot product of perpendicular vectors is zero." },
        { sub: "Mathematics", q: "A die is thrown twice. Probability that sum of numbers is 8?", opts: ["5/36", "1/6", "4/36", "7/36"], ans: 0, exp: "Favorable: (2,6),(3,5),(4,4),(5,3),(6,2). Total 5/36." },
        { sub: "Mathematics", q: "Order and degree of (d²y/dx²) + (dy/dx)^(1/3) + x^(1/4) = 0:", opts: ["2, 3", "3, 2", "2, 2", "2, 1"], ans: 0, exp: "Highest derivative is 2. Removing fractional power (1/3) makes its power 3." }
    ];

    let userAnswers = Array(30).fill(null);
    let visitedArr = Array(30).fill(false);
    let currentIdx = 0;
    let timerRef;
    let timeRem = 3600;

    function beginTest() {
        userData.name = document.getElementById('u-name').value;
        userData.state = document.getElementById('u-state').value;
        userData.dist = document.getElementById('u-dist').value;
        if(!userData.name || !userData.state) return alert("Please enter all details!");

        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('test-view').style.display = 'flex';
        document.getElementById('user-info').textContent = "Aspirant: " + userData.name;

        genPalette();
        renderQ(0);
        startTimer();
    }

    function genPalette() {
        const grid = document.getElementById('p-grid');
        for(let i=0; i<30; i++) {
            const div = document.createElement('div');
            div.className = 'p-box';
            div.id = 'p-' + i;
            div.textContent = i+1;
            div.onclick = () => renderQ(i);
            grid.appendChild(div);
        }
    }

    function renderQ(idx) {
        currentIdx = idx;
        visitedArr[idx] = true;
        const q = questions[idx];
        document.getElementById('sub-tag').textContent = q.sub;
        document.getElementById('q-body').textContent = q.q;
        
        const optBox = document.getElementById('opt-container');
        optBox.innerHTML = '';
        q.opts.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = "option " + (userAnswers[idx] === i ? 'selected' : '');
            div.textContent = "(" + String.fromCharCode(65+i) + ") " + opt;
            div.onclick = () => { userAnswers[idx] = i; renderQ(idx); };
            optBox.appendChild(div);
        });
        updatePalette();
    }

    function updatePalette() {
        for(let i=0; i<30; i++) {
            const el = document.getElementById('p-' + i);
            el.classList.remove('active', 'answered', 'not-answered');
            if(i === currentIdx) el.classList.add('active');
            if(userAnswers[i] !== null) el.classList.add('answered');
            else if(visitedArr[i]) el.classList.add('not-answered');
        }
    }

    function saveNext() { if(currentIdx < 29) renderQ(currentIdx + 1); else alert("Final Question. Please Submit."); }
    function clearAns() { userAnswers[currentIdx] = null; renderQ(currentIdx); }

    function startTimer() {
        timerRef = setInterval(() => {
            timeRem--;
            let m = Math.floor(timeRem/60);
            let s = timeRem%60;
            document.getElementById('timer-box').textContent = `${m}:${s<10?'0'+s:s}`;
            if(timeRem <= 0) finalizeTest();
        }, 1000);
    }

    function submitConfirm() { if(confirm("Are you sure you want to submit?")) finalizeTest(); }

    function finalizeTest() {
        clearInterval(timerRef);
        let score = 0;
        userAnswers.forEach((a, i) => {
            if(a === questions[i].ans) score += 4;
            else if(a !== null) score -= 1;
        });

        document.getElementById('test-view').style.display = 'none';
        document.getElementById('result-view').style.display = 'block';
        document.getElementById('final-score').textContent = score;
        document.getElementById('user-details').textContent = `${userData.name} | ${userData.dist}, ${userData.state}`;

        const solBox = document.getElementById('solutions-box');
        questions.forEach((q, i) => {
            const card = document.createElement('div');
            card.className = 'sol-card';
            const correct = userAnswers[i] === q.ans;
            card.innerHTML = `
                <p><strong>Q${i+1}:</strong> ${q.q}</p>
                <p style="color:${correct?'green':'red'}">Your Answer: ${userAnswers[i]!==null ? q.opts[userAnswers[i]] : 'Skipped'}</p>
                <p style="color:green"><strong>Correct:</strong> ${q.opts[q.ans]}</p>
                <p style="margin-top:8px; font-size:0.85rem; color:#555"><strong>Explanation:</strong> ${q.exp}</p>
            `;
            solBox.appendChild(card);
        });
    }

    function shareTest() {
        const score = document.getElementById('final-score').textContent;
        const msg = `🎯 JEE Weekly Test Score: ${score}/120\nCandidate: ${userData.name}\nDistrict: ${userData.dist}\n\nChallenge your friends! Test Link: ${window.location.href}`;
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>

</body>
</html>
