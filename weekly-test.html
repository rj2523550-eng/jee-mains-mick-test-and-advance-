<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEE Master Hub - Weekly Test</title>
    <script src="equations.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; }
        .container { max-width: 800px; margin: auto; padding: 15px; }
        
        /* Login & Header */
        .header-box { text-align: center; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .sunday-notice { color: var(--danger); font-weight: bold; }
        .login-form input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        
        /* Test UI */
        #test-section { display: none; }
        .timer-bar { position: sticky; top: 0; background: var(--primary); color: white; padding: 10px; display: flex; justify-content: space-between; z-index: 100; }
        .question-card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .option-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; background: #fff; text-align: left; cursor: pointer; border-radius: 5px; }
        .option-btn.selected { background: var(--accent); color: white; border-color: var(--accent); }
        
        /* Controls */
        .controls { display: flex; justify-content: space-between; margin-top: 20px; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-submit { background: var(--success); color: white; width: 100%; margin-top: 20px; }
        
        /* Results */
        #result-section { display: none; background: white; padding: 20px; border-radius: 10px; }
        .history-item { border-bottom: 1px solid #eee; padding: 10px 0; }
        .solution-box { background: #f9f9f9; padding: 10px; border-left: 4px solid var(--accent); margin-top: 10px; font-size: 0.9em; }
        
        @media (max-width: 600px) { .btn { padding: 8px 15px; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <h1>Jee Master Hub</h1>
        <h3>Weekly Test Series</h3>
        <p class="sunday-notice">Notice: Every Sunday Test will be Live!</p>
    </div>

    <div id="login-section" class="header-box">
        <div class="login-form">
            <input type="text" id="userName" placeholder="Full Name" required>
            <input type="text" id="userDistrict" placeholder="District" required>
            <input type="text" id="userState" placeholder="State" required>
            <button class="btn btn-submit" onclick="startTest()">Start Mock Test</button>
        </div>
    </div>

    <div id="test-section">
        <div class="timer-bar">
            <span id="subject-label">Physics</span>
            <span id="timer">60:00</span>
        </div>
        <div id="question-container">
            </div>
        <div class="controls">
            <button class="btn" style="background:#95a5a6" onclick="prevQuestion()">Previous</button>
            <button class="btn" style="background:var(--accent); color:white" onclick="nextQuestion()">Next</button>
        </div>
        <button class="btn btn-submit" onclick="finishTest()">Submit Test</button>
    </div>

    <div id="result-section">
        <h2>Test Results</h2>
        <div id="score-summary"></div>
        <button class="btn" style="background:#25D366; color:white; width:100%; margin:10px 0;" onclick="shareResult()">Share on WhatsApp</button>
        
        <h3>Detailed Solutions</h3>
        <div id="solutions-container"></div>
        
        <hr>
        <h3>Last 10 Tests History</h3>
        <div id="history-container"></div>
    </div>
</div>

<script>
    let currentQ = 0;
    let userAnswers = new Array(30).fill(null);
    let timeLeft = 3600; // 60 mins
    let timerInterval;

    function startTest() {
        const name = document.getElementById('userName').value;
        if(!name) return alert("Please enter your name");
        
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('test-section').style.display = 'block';
        
        loadQuestion();
        startTimer();
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            document.getElementById('timer').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            if(timeLeft <= 0) finishTest();
        }, 1000);
    }

    function loadQuestion() {
        const qData = questions[currentQ];
        const container = document.getElementById('question-container');
        
        document.getElementById('subject-label').innerText = qData.subject + ` (${currentQ + 1}/30)`;
        
        container.innerHTML = `
            <div class="question-card">
                <p><strong>Q${currentQ + 1}:</strong> ${qData.q}</p>
                ${qData.options.map((opt, i) => `
                    <button class="option-btn ${userAnswers[currentQ] === i ? 'selected' : ''}" 
                            onclick="selectOption(${i})">
                        ${opt}
                    </button>
                `).join('')}
            </div>
        `;
    }

    function selectOption(index) {
        userAnswers[currentQ] = index;
        loadQuestion();
    }

    function nextQuestion() {
        if(currentQ < questions.length - 1) { currentQ++; loadQuestion(); }
    }

    function prevQuestion() {
        if(currentQ > 0) { currentQ--; loadQuestion(); }
    }

    function finishTest() {
        clearInterval(timerInterval);
        let score = 0;
        let correct = 0;
        let wrong = 0;

        questions.forEach((q, i) => {
            if(userAnswers[i] === q.correct) {
                score += 4;
                correct++;
            } else if(userAnswers[i] !== null) {
                score -= 1;
                wrong++;
            }
        });

        saveToHistory(score);
        showResults(score, correct, wrong);
    }

    function saveToHistory(score) {
        let history = JSON.parse(localStorage.getItem('jee_history') || '[]');
        history.unshift({ date: new Date().toLocaleDateString(), score: score });
        history = history.slice(0, 10);
        localStorage.setItem('jee_history', JSON.stringify(history));
    }

    function showResults(score, correct, wrong) {
        document.getElementById('test-section').style.display = 'none';
        const resSec = document.getElementById('result-section');
        resSec.style.display = 'block';
        
        document.getElementById('score-summary').innerHTML = `
            <p>Total Score: <strong>${score}/120</strong></p>
            <p>Correct: ${correct} | Wrong: ${wrong} | Skipped: ${30 - (correct + wrong)}</p>
        `;

        // Solutions
        let solHTML = '';
        questions.forEach((q, i) => {
            solHTML += `
                <div class="question-card" style="border-left: 5px solid ${userAnswers[i] === q.correct ? '#27ae60' : '#e74c3c'}">
                    <p><strong>Q${i+1}:</strong> ${q.q}</p>
                    <p>Your Answer: ${userAnswers[i] !== null ? q.options[userAnswers[i]] : 'Skipped'}</p>
                    <p style="color:green">Correct Answer: ${q.options[q.correct]}</p>
                    <div class="solution-box"><strong>Solution:</strong> ${q.solution}</div>
                </div>`;
        });
        document.getElementById('solutions-container').innerHTML = solHTML;

        // History
        const history = JSON.parse(localStorage.getItem('jee_history'));
        document.getElementById('history-container').innerHTML = history.map(h => `
            <div class="history-item">${h.date} - Score: <strong>${h.score}</strong></div>
        `).join('');
    }

    function shareResult() {
        const text = `I scored ${document.getElementById('score-summary').innerText} on Jee Master Hub Weekly Test!`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
    }
</script>

</body>
</html>
