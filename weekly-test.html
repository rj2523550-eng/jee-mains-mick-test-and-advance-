<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEE Weekly Test - NTA Pattern</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --nta-blue: #2c3e50;
            --nta-gray: #f4f7f6;
            --ans-green: #27ae60;
            --not-ans-red: #e74c3c;
            --visited-purple: #9b59b6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background-color: var(--nta-gray); height: 100vh; overflow: hidden; }

        /* --- LOGIN MODAL --- */
        #login-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-card { background: white; padding: 30px; border-radius: 8px; width: 350px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .login-card h2 { margin-bottom: 20px; color: var(--nta-blue); border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .login-card input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; }
        .btn-start { background: #3498db; color: white; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 4px; }

        /* --- NTA HEADER --- */
        header { background: white; border-bottom: 1px solid #ddd; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; height: 60px; }
        .timer { font-size: 1.2rem; font-weight: bold; color: #d35400; }

        /* --- MAIN LAYOUT --- */
        .container { display: flex; height: calc(100vh - 60px); }

        /* Left Section: Question Area */
        .question-section { flex: 3; background: white; padding: 30px; overflow-y: auto; border-right: 1px solid #ddd; position: relative; }
        .subject-bar { background: #34495e; color: white; padding: 5px 15px; border-radius: 3px; display: inline-block; margin-bottom: 15px; }
        .question-text { font-size: 1.1rem; line-height: 1.6; margin-bottom: 25px; font-weight: 500; }
        .option { display: block; padding: 12px; border: 1px solid #ddd; margin-bottom: 10px; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .option:hover { background: #f0f0f0; }
        .option.selected { background: #d6eaf8; border-color: #3498db; }

        /* Bottom Controls */
        .controls { position: absolute; bottom: 0; left: 0; width: 100%; background: #eee; padding: 15px; display: flex; justify-content: space-between; border-top: 1px solid #ddd; }
        .btn { padding: 8px 20px; border: none; cursor: pointer; border-radius: 3px; font-weight: bold; }
        .btn-save { background: var(--ans-green); color: white; }
        .btn-clear { background: #95a5a6; color: white; }

        /* Right Section: Palette */
        .palette-section { flex: 1; background: #f9f9f9; padding: 20px; overflow-y: auto; }
        .palette-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; }
        .palette-num { height: 35px; width: 35px; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; cursor: pointer; border-radius: 3px; background: white; }
        .palette-num.answered { background: var(--ans-green); color: white; border: none; clip-path: polygon(0% 20%, 20% 0%, 80% 0%, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0% 80%); }
        .palette-num.not-answered { background: var(--not-ans-red); color: white; border: none; border-radius: 50% 50% 0 0; }
        .palette-num.active { border: 2px solid #3498db; transform: scale(1.1); }

        /* --- RESULT PAGE --- */
        .result-overlay { position: fixed; inset: 0; background: white; z-index: 2000; padding: 40px; overflow-y: auto; display: none; }
        .table-res { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .table-res td, .table-res th { border: 1px solid #ddd; padding: 12px; text-align: left; }
        .table-res th { background: var(--nta-blue); color: white; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2>Weekly Test 📝</h2>
        <input type="text" id="u-name" placeholder="Full Name">
        <input type="text" id="u-state" placeholder="State">
        <input type="text" id="u-dist" placeholder="District">
        <button class="btn-start" onclick="initTest()">Start Weekly Test</button>
    </div>
</div>

<header>
    <div id="user-display" style="font-weight: bold;">NTA Mock Test</div>
    <div class="timer" id="timer">60:00</div>
</header>

<div class="container" id="test-main" style="display: none;">
    <div class="question-section">
        <div class="subject-bar" id="sub-tag">Subject</div>
        <div class="question-text" id="q-text">Loading question...</div>
        <div id="options-container"></div>
        
        <div class="controls">
            <button class="btn btn-clear" onclick="clearResponse()">Clear Response</button>
            <button class="btn btn-save" onclick="saveAndNext()">Save & Next</button>
        </div>
    </div>

    <div class="palette-section">
        <h3>Question Palette</h3>
        <div class="palette-grid" id="palette-grid"></div>
        <button class="btn-start" style="margin-top: 30px; background: var(--not-ans-red);" onclick="submitTest()">Submit Test</button>
    </div>
</div>

<div class="result-overlay" id="result-page">
    <h1>Test Summary</h1>
    <p id="res-user-info"></p>
    <h2 style="color: var(--ans-green); margin: 20px 0;">Final Score: <span id="final-score"></span>/120</h2>
    
    <h3>Leaderboard (Top 10)</h3>
    <table class="table-res" id="leader-table">
        <thead><tr><th>Rank</th><th>Name</th><th>Location</th><th>Score</th></tr></thead>
        <tbody id="leader-body"></tbody>
    </table>

    <button class="btn-start" style="width: 200px; margin-top: 20px;" onclick="location.reload()">Back to Dashboard</button>
</div>

<script>
    let questions = [];
    let currentIdx = 0;
    let answers = Array(30).fill(null);
    let visited = Array(30).fill(false);
    let userData = {};
    let timeLeft = 3600; // 1 hour

    // Dummy Question Generator (Aap yahan apne real 30 sawal daalein)
    function generateDummyQuestions() {
        for(let i=1; i<=30; i++) {
            questions.push({
                id: i,
                sub: i <= 10 ? "Physics" : (i <= 20 ? "Chemistry" : "Maths"),
                text: `Question Number ${i}: Sample JEE level question text goes here for ${i <= 10 ? "Physics" : (i <= 20 ? "Chemistry" : "Maths")}.`,
                options: ["Option A", "Option B", "Option C", "Option D"],
                ans: Math.floor(Math.random() * 4) // Demo purpose only
            });
        }
    }

    function initTest() {
        userData.name = document.getElementById('u-name').value;
        userData.state = document.getElementById('u-state').value;
        userData.dist = document.getElementById('u-dist').value;
        if(!userData.name || !userData.state) return alert("Details bharo!");

        generateDummyQuestions();
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('test-main').style.display = 'flex';
        document.getElementById('user-display').textContent = `Candidate: ${userData.name}`;
        
        createPalette();
        loadQuestion(0);
        startTimer();
    }

    function createPalette() {
        const grid = document.getElementById('palette-grid');
        for(let i=0; i<30; i++) {
            const div = document.createElement('div');
            div.className = 'palette-num';
            div.id = `pal-${i}`;
            div.textContent = i+1;
            div.onclick = () => loadQuestion(i);
            grid.appendChild(div);
        }
    }

    function loadQuestion(idx) {
        currentIdx = idx;
        visited[idx] = true;
        const q = questions[idx];
        
        document.getElementById('sub-tag').textContent = q.sub;
        document.getElementById('q-text').textContent = q.text;
        
        const optDiv = document.getElementById('options-container');
        optDiv.innerHTML = '';
        q.options.forEach((opt, i) => {
            const d = document.createElement('div');
            d.className = `option ${answers[idx] === i ? 'selected' : ''}`;
            d.textContent = opt;
            d.onclick = () => selectOption(i, d);
            optDiv.appendChild(d);
        });

        updatePaletteUI();
    }

    function selectOption(i, el) {
        document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
        answers[currentIdx] = i;
    }

    function saveAndNext() {
        if(currentIdx < 29) loadQuestion(currentIdx + 1);
    }

    function clearResponse() {
        answers[currentIdx] = null;
        document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        updatePaletteUI();
    }

    function updatePaletteUI() {
        for(let i=0; i<30; i++) {
            const el = document.getElementById(`pal-${i}`);
            el.classList.remove('active', 'answered', 'not-answered');
            if(i === currentIdx) el.classList.add('active');
            
            if(answers[i] !== null) el.classList.add('answered');
            else if(visited[i]) el.classList.add('not-answered');
        }
    }

    function startTimer() {
        setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft/60);
            let s = timeLeft%60;
            document.getElementById('timer').textContent = `${m}:${s < 10 ? '0'+s : s}`;
            if(timeLeft <= 0) submitTest();
        }, 1000);
    }

    function submitTest() {
        let score = 0;
        answers.forEach((ans, i) => {
            if(ans === questions[i].ans) score += 4;
            else if(ans !== null) score -= 1;
        });

        document.getElementById('result-page').style.display = 'block';
        document.getElementById('final-score').textContent = score;
        document.getElementById('res-user-info').textContent = `Name: ${userData.name} | Location: ${userData.dist}, ${userData.state}`;
        
        // Save to Leaderboard
        let weeklyScores = JSON.parse(localStorage.getItem('jeeWeeklyScores')) || [];
        weeklyScores.push({name: userData.name, loc: `${userData.dist}, ${userData.state}`, score: score});
        weeklyScores.sort((a,b) => b.score - a.score);
        weeklyScores = weeklyScores.slice(0, 10);
        localStorage.setItem('jeeWeeklyScores', JSON.stringify(weeklyScores));

        const body = document.getElementById('leader-body');
        body.innerHTML = '';
        weeklyScores.forEach((s, i) => {
            body.innerHTML += `<tr><td>${i+1}</td><td>${s.name}</td><td>${s.loc}</td><td>${s.score}</td></tr>`;
        });
    }
</script>

</body>
</html>
