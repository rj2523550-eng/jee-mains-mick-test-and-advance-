<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jee Master Hub - Weekly Test</title>
    
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <script src="equation.js"></script>

    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; padding: 10px; }
        .container { max-width: 600px; margin: auto; }
        .header-box { text-align: center; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .sunday-notice { color: var(--danger); font-weight: bold; font-size: 0.9em; }
        
        /* Mobile Friendly Inputs */
        .login-form input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        /* Test UI */
        #test-section { display: none; }
        .timer-bar { position: sticky; top: 0; background: var(--primary); color: white; padding: 12px; display: flex; justify-content: space-between; border-radius: 5px; margin-bottom: 15px; z-index: 100; }
        .question-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); min-height: 200px; }
        .option-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #eee; background: #fdfdfd; text-align: left; cursor: pointer; border-radius: 8px; font-size: 15px; transition: 0.2s; }
        .option-btn.selected { background: var(--accent); color: white; border-color: var(--accent); font-weight: bold; }
        
        .controls { display: flex; justify-content: space-between; margin-top: 15px; gap: 10px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; }
        .btn-submit { background: var(--success); color: white; width: 100%; margin-top: 20px; height: 50px; }
        
        #result-section { display: none; background: white; padding: 20px; border-radius: 12px; }
        .sol-box { background: #f0f7ff; padding: 15px; border-radius: 8px; margin-top: 10px; border-left: 5px solid var(--accent); font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <h1 style="margin:0; color:var(--primary);">Jee Master Hub</h1>
        <p style="margin:5px 0;">Weekly Test Series</p>
        <div class="sunday-notice">Every Sunday Test will be Live!</div>
    </div>

    <div id="login-section" class="header-box">
        <div class="login-form">
            <input type="text" id="uName" placeholder="Student Name">
            <input type="text" id="uDist" placeholder="District">
            <input type="text" id="uState" placeholder="State">
            <button class="btn btn-submit" onclick="startTest()">Start Test</button>
        </div>
    </div>

    <div id="test-section">
        <div class="timer-bar">
            <span id="subject-info">Loading...</span>
            <span id="timer">60:00</span>
        </div>
        <div id="question-container"></div>
        <div class="controls">
            <button class="btn" style="background:#bdc3c7" onclick="prev()">Previous</button>
            <button class="btn" style="background:var(--accent); color:white" onclick="next()">Next</button>
        </div>
        <button class="btn btn-submit" onclick="finish()">Submit Final Test</button>
    </div>

    <div id="result-section">
        <h2 style="text-align:center">Result</h2>
        <div id="score-card" style="text-align:center; font-size: 1.2em; margin-bottom: 20px;"></div>
        <button class="btn" style="background:#25D366; color:white; width:100%" onclick="share()">Share Result on WhatsApp</button>
        <hr>
        <h3>Step-by-Step Solutions:</h3>
        <div id="solutions"></div>
    </div>
</div>

<script>
    let allQ = [];
    let currentIdx = 0;
    let userAns = [];
    let timer;
    let secondsLeft = 3600;

    function startTest() {
        if(!document.getElementById('uName').value) return alert("Enter Name");
        
        // Aapke equation.js structure ke hisaab se data load karna
        try {
            allQ = [...questions.physics, ...questions.chemistry, ...questions.maths];
            userAns = new Array(allQ.length).fill(null);
            
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('test-section').style.display = 'block';
            
            showQ();
            timer = setInterval(updateTimer, 1000);
        } catch(e) {
            alert("Error: questions.physics/chemistry/maths not found in equation.js");
            console.error(e);
        }
    }

    function showQ() {
        const q = allQ[currentIdx];
        document.getElementById('subject-info').innerText = `Q. ${currentIdx + 1} / ${allQ.length}`;
        
        let html = `<div class="question-card">
            <p>${q.q}</p>
            ${q.options.map((opt, i) => `
                <button class="option-btn ${userAns[currentIdx] === i ? 'selected' : ''}" onclick="pick(${i})">
                    ${opt}
                </button>
            `).join('')}
        </div>`;
        
        document.getElementById('question-container').innerHTML = html;
        // Re-render Math equations if any
        if(window.MathJax) MathJax.typeset();
    }

    function pick(idx) { userAns[currentIdx] = idx; showQ(); }
    function next() { if(currentIdx < allQ.length - 1) { currentIdx++; showQ(); } }
    function prev() { if(currentIdx > 0) { currentIdx--; showQ(); } }

    function updateTimer() {
        secondsLeft--;
        let m = Math.floor(secondsLeft / 60);
        let s = secondsLeft % 60;
        document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        if(secondsLeft <= 0) finish();
    }

    function finish() {
        clearInterval(timer);
        let score = 0, correct = 0, wrong = 0;

        allQ.forEach((q, i) => {
            if(userAns[i] === q.correct) { score += 4; correct++; }
            else if(userAns[i] !== null) { score -= 1; wrong++; }
        });

        document.getElementById('test-section').style.display = 'none';
        document.getElementById('result-section').style.display = 'block';
        
        document.getElementById('score-card').innerHTML = `
            <div style="color:var(--success); font-weight:bold; font-size:2em;">${score} Marks</div>
            <p>Correct: ${correct} | Wrong: ${wrong}</p>
        `;

        let solHtml = '';
        allQ.forEach((q, i) => {
            solHtml += `<div class="question-card" style="margin-top:10px; border-bottom:2px solid #eee">
                <p><strong>Q${i+1}.</strong> ${q.q}</p>
                <p style="color:${userAns[i] === q.correct ? 'green' : 'red'}">Your Answer: ${userAns[i] !== null ? q.options[userAns[i]] : 'Not Attempted'}</p>
                <p style="color:green">Correct: ${q.options[q.correct]}</p>
                <div class="sol-box"><strong>Solution:</strong> ${q.solution}</div>
            </div>`;
        });
        document.getElementById('solutions').innerHTML = solHtml;
        if(window.MathJax) MathJax.typeset();
    }

    function share() {
        let name = document.getElementById('uName').value;
        let score = document.getElementById('score-card').innerText;
        let text = `Student: ${name}\nScore on Jee Master Hub: ${score}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
    }
</script>

</body>
</html>
