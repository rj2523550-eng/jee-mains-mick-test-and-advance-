<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEE Weekly Test - PYQ Special</title>
    <style>
        :root {
            --primary: #1e40af;
            --bg: #f8fafc;
            --white: #ffffff;
            --success: #16a34a;
            --danger: #dc2626;
            --text: #1e293b;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .header { background: var(--primary); color: white; padding: 15px 30px; display: flex; justify-content: space-between; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .timer { background: var(--danger); padding: 5px 15px; border-radius: 5px; font-weight: bold; }

        .container { max-width: 1000px; margin: 30px auto; display: grid; grid-template-columns: 1fr 280px; gap: 20px; padding: 0 15px; }

        .question-box { background: var(--white); padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); min-height: 400px; }
        .subject-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 0.8rem; margin-bottom: 15px; }
        .phys { background: #dcfce7; color: #166534; }
        .chem { background: #fef9c3; color: #854d0e; }
        .math { background: #dbeafe; color: #1e40af; }

        .option { display: block; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .option:hover { background: #f1f5f9; border-color: var(--primary); }
        .option.selected { background: #eff6ff; border-color: var(--primary); font-weight: bold; }

        .palette { background: var(--white); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); height: fit-content; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px; }
        .num-btn { width: 40px; height: 40px; border: 1px solid #cbd5e1; background: white; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
        .num-btn.active { border: 2px solid var(--primary); color: var(--primary); }
        .num-btn.answered { background: var(--success); color: white; border-color: var(--success); }

        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        .btn-next { background: var(--primary); color: white; }
        .btn-submit { background: var(--danger); color: white; width: 100%; }

        #result { display: none; text-align: center; background: white; padding: 40px; border-radius: 15px; max-width: 600px; margin: 50px auto; }
    </style>
</head>
<body>

<div class="header">
    <div><b>WEEKLY TEST: JEE ADVANCED/MAINS LEVEL</b></div>
    <div class="timer" id="time-display">60:00</div>
</div>

<div class="container" id="quiz-ui">
    <div class="question-box">
        <div id="sub-tag" class="subject-badge">SUBJECT</div>
        <h3 id="q-num">Question 1</h3>
        <p id="q-text" style="font-size: 1.1rem; line-height: 1.6;">Loading...</p>
        <div id="options"></div>
        <button class="btn btn-next" onclick="nextQ()">Save & Next</button>
    </div>

    <div class="palette">
        <h4>Palette</h4>
        <div class="grid" id="palette-grid"></div>
        <button class="btn btn-submit" onclick="showResults()">Submit Test</button>
    </div>
</div>

<div id="result">
    <h2>Test Summary</h2>
    <div style="font-size: 3rem; color: var(--primary); margin: 20px 0;" id="total-score">0 / 60</div>
    <p id="stats"></p>
    <button class="btn btn-next" onclick="location.reload()">Restart Test</button>
</div>

<script>
const quizData = [
    // PHYSICS
    { sub: 'PHYSICS', class: 'phys', q: 'Momentum (P), Area (A), and Time (T) are fundamental quantities. Dimensional formula for Energy is:', opts: ['[P^1 A^{1/2} T^{-1}]', '[P^2 A^{-1} T^1]', '[P^1 A^{-1/2} T^0]', '[P^1 A^{1/2} T^1]'], ans: 0 },
    { sub: 'PHYSICS', class: 'phys', q: 'Velocity varies with displacement as v = α√x. Average velocity for the first S distance is:', opts: ['(α√S)/2', 'α√S', '(α√S)/√2', '(2α√S)/3'], ans: 0 },
    { sub: 'PHYSICS', class: 'phys', q: 'A solid sphere and a solid cylinder (same M, R) roll down an inclined plane. Ratio of accelerations a_sphere/a_cylinder is:', opts: ['14:15', '15:14', '5:4', '2:3'], ans: 1 },
    { sub: 'PHYSICS', class: 'phys', q: 'Ideal gas PV^2 = constant. Initial T and V. Final T when volume becomes 2V?', opts: ['2T', 'T/2', 'T/4', '4T'], ans: 1 },
    { sub: 'PHYSICS', class: 'phys', q: 'Charges +Q, q, +Q at 0, d/2, d. If net force on +Q at x=0 is zero, then q is:', opts: ['-Q/2', '-Q/4', '+Q/2', '+Q/4'], ans: 1 },

    // CHEMISTRY
    { sub: 'CHEMISTRY', class: 'chem', q: 'For first-order reaction, time for 99% completion is x times the time for 90% completion. x is:', opts: ['1', '2', '3', '10'], ans: 1 },
    { sub: 'CHEMISTRY', class: 'chem', q: 'Correct order of bond angle for BH3, NH3, PCl3, BF3 is:', opts: ['BF3 = BH3 > NH3 > PCl3', 'PCl3 > NH3 > BH3 > BF3', 'NH3 > PCl3 > BF3 = BH3', 'BF3 > BH3 > NH3 > PCl3'], ans: 0 },
    { sub: 'CHEMISTRY', class: 'chem', q: 'Which compound will undergo Cannizzaro reaction?', opts: ['CH3CHO', 'C6H5CHO', 'CH3CH2CHO', 'CH3COCH3'], ans: 1 },
    { sub: 'CHEMISTRY', class: 'chem', q: 'Spin-only magnetic moment of [Fe(H2O)6]2+ is approximately:', opts: ['5.92 BM', '4.90 BM', '3.87 BM', '1.73 BM'], ans: 1 },
    { sub: 'CHEMISTRY', class: 'chem', q: 'Na2SO4 (5g) in 45g water, ΔTf = -3.82°C. Kf = 1.86. Van\'t Hoff factor i is:', opts: ['2.1', '2.6', '3.0', '1.5'], ans: 1 },

    // MATHS
    { sub: 'MATHS', class: 'math', q: 'If f(x) = ∫[0 to x] (t^2)/(1+t^4) dt, then f\'(1) is:', opts: ['1/2', '1', '0', '1/4'], ans: 0 },
    { sub: 'MATHS', class: 'math', q: 'If complex number z satisfies |z-i| = |z+i|, then locus of z is:', opts: ['A circle', 'The x-axis', 'The y-axis', 'A parabola'], ans: 1 },
    { sub: 'MATHS', class: 'math', q: 'Volume of parallelepiped with edges a=i+j, b=j+k, c=k+i is:', opts: ['1', '2', '0', '4'], ans: 1 },
    { sub: 'MATHS', class: 'math', q: 'If A is 3x3 matrix and |A|=5, then |adj(adj A)| is:', opts: ['5^2', '5^4', '5^8', '5^9'], ans: 1 },
    { sub: 'MATHS', class: 'math', q: 'Two dice thrown. Probability that the sum is a prime number?', opts: ['5/12', '7/36', '1/2', '15/36'], ans: 0 }
];

let currentIdx = 0;
let userAnswers = new Array(15).fill(null);
let timeLeft = 3600;

function init() {
    renderPalette();
    showQuestion();
    startTimer();
}

function showQuestion() {
    const data = quizData[currentIdx];
    document.getElementById('sub-tag').innerText = data.sub;
    document.getElementById('sub-tag').className = `subject-badge ${data.class}`;
    document.getElementById('q-num').innerText = `Question ${currentIdx + 1}`;
    document.getElementById('q-text').innerText = data.q;
    
    const optionsDiv = document.getElementById('options');
    optionsDiv.innerHTML = data.opts.map((opt, i) => `
        <div class="option ${userAnswers[currentIdx] === i ? 'selected' : ''}" onclick="selectOpt(${i})">${opt}</div>
    `).join('');
    
    updatePalette();
}

function selectOpt(i) {
    userAnswers[currentIdx] = i;
    showQuestion();
}

function nextQ() {
    if(currentIdx < 14) { currentIdx++; showQuestion(); }
}

function renderPalette() {
    const grid = document.getElementById('palette-grid');
    grid.innerHTML = quizData.map((_, i) => `
        <button class="num-btn" id="btn-${i}" onclick="jumpTo(${i})">${i+1}</button>
    `).join('');
}

function updatePalette() {
    quizData.forEach((_, i) => {
        const btn = document.getElementById(`btn-${i}`);
        btn.className = 'num-btn';
        if(i === currentIdx) btn.classList.add('active');
        if(userAnswers[i] !== null) btn.classList.add('answered');
    });
}

function jumpTo(i) { currentIdx = i; showQuestion(); }

function startTimer() {
    const timer = setInterval(() => {
        timeLeft--;
        let m = Math.floor(timeLeft/60);
        let s = timeLeft%60;
        document.getElementById('time-display').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        if(timeLeft <= 0) { clearInterval(timer); showResults(); }
    }, 1000);
}

function showResults() {
    let score = 0, correct = 0, wrong = 0;
    userAnswers.forEach((ans, i) => {
        if(ans !== null) {
            if(ans === quizData[i].ans) { score += 4; correct++; }
            else { score -= 1; wrong++; }
        }
    });

    document.getElementById('quiz-ui').style.display = 'none';
    const resDiv = document.getElementById('result');
    resDiv.style.display = 'block';
    document.getElementById('total-score').innerText = `${score} / 60`;
    document.getElementById('stats').innerText = `Correct: ${correct} | Incorrect: ${wrong} | Unattempted: ${15-(correct+wrong)}`;
}

init();
</script>
</body>
</html>
