<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEE Master Hub - Weekly Test</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; }
        .hidden { display: none !important; }
        
        /* Login Card */
        #login-screen { position: fixed; inset: 0; background: #fff; z-index: 100; display: flex; justify-content: center; align-items: center; }
        .login-card { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        .login-card input { width: 90%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; }
        
        /* Header & Timer */
        .header { background: var(--primary); color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; }
        .question-box { background: white; max-width: 850px; margin: 30px auto; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* NTA Style Options */
        .opt-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; text-align: left; background: white; font-size: 16px; }
        .opt-btn:hover { background: #f8f9fa; }
        .selected-opt { border: 2px solid var(--accent); background: #eef7ff; font-weight: bold; }
        
        .nav-btn { padding: 12px 30px; background: var(--success); color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; float: right; }
        
        /* Analysis Style */
        .review-item { border-left: 5px solid #ccc; padding: 15px; margin-bottom: 20px; background: white; border-radius: 5px; text-align: left; }
        .status-correct { border-left-color: var(--success); }
        .status-wrong { border-left-color: #e74c3c; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2>JEE Master Hub</h2>
        <p style="color: #e67e22; font-weight: bold; font-size: 0.85em;">NOTICE: Behtar anubhav ke liye Desktop Mode on karein.</p>
        <input type="text" id="stdName" placeholder="Full Name">
        <input type="text" id="stdDistrict" placeholder="District">
        <input type="text" id="stdState" placeholder="State">
        <button onclick="startTest()" style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:5px; cursor:pointer; margin-top:10px;">Start Test</button>
    </div>
</div>

<div id="exam-area" class="hidden">
    <div class="header">
        <div><b id="display-name"></b> | <span id="display-loc"></span></div>
        <div id="timer" style="font-size: 1.3em; font-weight: bold;">60:00</div>
    </div>

    <div class="question-box">
        <h3 id="q-text">Loading...</h3>
        <div id="options-area"></div>
        <div style="margin-top:20px; overflow: hidden;">
            <button class="nav-btn" onclick="nextQuestion()">Next Question &gt;</button>
        </div>
    </div>
</div>

<div id="result-screen" class="hidden" style="text-align:center; padding:50px;">
    <h1 id="score-text"></h1>
    <p style="font-weight: bold; color: var(--primary);">"JEE Master Hub: Agli manjil aapki hai!"</p>
    <button onclick="shareResult()" style="padding:12px 25px; background:#25D366; color:white; border:none; border-radius:5px; cursor:pointer; margin-bottom:30px;">Share Result on WhatsApp</button>
    <hr>
    <h3 style="margin-top:30px;">Step-by-Step Question Analysis:</h3>
    <div id="review-container" style="max-width:850px; margin:auto;"></div>
</div>

<script src="equation.js"></script>

<script>
    let currentQ = 0;
    let score = 0;
    let timeLeft = 3600; 
    let userChoices = []; 
    let allQuestions = [];
    let selectedIdx = null;

    function startTest() {
        const name = document.getElementById('stdName').value;
        if(!name) return alert("Please enter your name");
        
        if (typeof examQuestions === 'undefined') {
            return alert("Error: equation.js file nahi mili!");
        }

        allQuestions = [...examQuestions.physics, ...examQuestions.chemistry, ...examQuestions.maths];

        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('exam-area').classList.remove('hidden');
        document.getElementById('display-name').innerText = name;
        document.getElementById('display-loc').innerText = document.getElementById('stdDistrict').value;
        
        startTimer();
        loadQuestion();
    }

    function startTimer() {
        const timerElement = document.getElementById('timer');
        const interval = setInterval(() => {
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            timerElement.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            if(timeLeft <= 0) { clearInterval(interval); finishExam(); }
            timeLeft--;
        }, 1000);
    }

    function loadQuestion() {
        if(currentQ >= allQuestions.length) { finishExam(); return; }
        
        selectedIdx = null;
        const q = allQuestions[currentQ];
        document.getElementById('q-text').innerText = `Q${currentQ+1}. ${q.q}`;
        
        const optArea = document.getElementById('options-area');
        optArea.innerHTML = '';
        
        q.options.forEach((opt, index) => {
            optArea.innerHTML += `<button class="opt-btn" onclick="selectOption(${index})">${opt}</button>`;
        });
    }

    function selectOption(idx) {
        selectedIdx = idx;
        const btns = document.querySelectorAll('.opt-btn');
        btns.forEach(b => b.classList.remove('selected-opt'));
        btns[idx].classList.add('selected-opt');
    }

    function nextQuestion() {
        // Scoring: Correct +4, Wrong -1, None 0
        if(selectedIdx !== null) {
            if(selectedIdx === allQuestions[currentQ].correct) score += 4;
            else score -= 1;
        }
        userChoices.push(selectedIdx);
        currentIdx = ++currentQ;
        loadQuestion();
    }

    function finishExam() {
        document.getElementById('exam-area').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('score-text').innerText = `Final Score: ${score} / 120`;
        
        saveToLocal();
        showReview();
    }

    function showReview() {
        const container = document.getElementById('review-container');
        container.innerHTML = "";
        allQuestions.forEach((q, i) => {
            const isCorrect = userChoices[i] === q.correct;
            container.innerHTML += `
                <div class="review-item ${isCorrect ? 'status-correct' : 'status-wrong'}">
                    <p><b>Q${i+1}:</b> ${q.q}</p>
                    <p>Sahi Jawab: <span style="color:green">${q.options[q.correct]}</span></p>
                    <p>Aapka Jawab: ${userChoices[i] !== null ? q.options[userChoices[i]] : 'Nahi Diya'}</p>
                    <div style="background:#fdf2f2; padding:10px; border-radius:5px; margin-top:10px; font-size:0.9em;">
                        <b>Solution:</b> ${q.solution}
                    </div>
                </div>`;
        });
    }

    function saveToLocal() {
        let history = JSON.parse(localStorage.getItem('testHistory') || '[]');
        history.unshift({ score: score, date: new Date().toLocaleDateString() });
        if(history.length > 10) history.pop();
        localStorage.setItem('testHistory', JSON.stringify(history));
    }

    function shareResult() {
        const text = `Maine JEE Master Hub par test diya aur ${score} marks paye! Aap bhi try karein: https://jeemasterhub.in`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    }
</script>
</body>
</html>
