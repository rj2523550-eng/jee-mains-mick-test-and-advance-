<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEE Mains PYQs</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: white; border-radius: 8px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        .info h3 { margin: 0; color: #333; }
        .info p { margin: 5px 0; color: #666; }
        .buttons { display: flex; gap: 10px; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; font-weight: bold; font-size: 14px; }
        .btn-download { background-color: #2ecc71; color: white; }
        .btn-share { background-color: #3498db; color: white; }
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center;">JEE Mains Previous Year Papers</h2>

    <div class="card">
        <div class="info">
            <h3>JEE Mains 2024 (Session 1)</h3>
            <p>Date: 27 Jan | Shift 1</p>
        </div>
        <div class="buttons">
            <a href="YOUR_PDF_LINK_HERE.pdf" class="btn btn-download" download>Download</a>
            <button class="btn btn-share" onclick="sharePaper('JEE Mains 2024 27 Jan Shift 1', 'YOUR_PDF_LINK_HERE.pdf')">Share</button>
        </div>
    </div>

    </div>

<script>
    function sharePaper(title, url) {
        if (navigator.share) {
            navigator.share({
                title: title,
                text: 'Dost! Dekho ye JEE Mains ka paper hai: ' + title,
                url: url
            }).then(() => console.log('Successful share'))
            .catch((error) => console.log('Error sharing', error));
        } else {
            // Agar browser share support nahi karta (jaise desktop)
            alert("Share feature mobile devices par best kaam karta hai. Link copy karein: " + url);
        }
    }
</script>

</body>
</html>
