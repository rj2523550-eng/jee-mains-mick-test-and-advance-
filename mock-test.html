<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Test - Exam Prep</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary-blue: #3b82f6;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --accent-orange: #fb923c;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        .container {
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }

        /* Urgent Banner */
        .alert-banner {
            background: linear-gradient(90deg, #1e293b, #334155);
            border-left: 5px solid var(--accent-orange);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .alert-icon {
            font-size: 24px;
        }

        .alert-text b {
            color: var(--accent-orange);
            font-size: 1.1rem;
        }

        /* Test Card Design */
        .test-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #334155;
            transition: transform 0.2s;
        }

        .test-card:active {
            transform: scale(0.98);
        }

        .test-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .test-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary-blue);
        }

        .test-meta {
            font-size: 0.85rem;
            color: var(--text-dim);
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        .btn-start {
            display: block;
            width: 100%;
            background-color: var(--primary-blue);
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 15px;
        }

        /* Mobile Specific */
        @media (max-width: 600px) {
            .container { padding: 15px; }
            .test-title { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="alert-banner">
        <div class="alert-icon">⚠️</div>
        <div class="alert-text">
            <b>Exams ke sirf 20 days pehle!</b><br>
            Abhi Mock Test solve karein aur apni taiyari check karein.
        </div>
    </div>

    <h2 style="margin-bottom: 20px;">Available Mock Tests</h2>

    <div class="test-card">
        <div class="test-header">
            <div>
                <div class="test-title">Full Length Mock Test - 01</div>
                <div class="test-meta">
                    <span>⏱️ 180 Mins</span>
                    <span>📝 100 Qs</span>
                </div>
            </div>
        </div>
        <p style="color: var(--text-dim); font-size: 0.9rem;">Based on latest exam pattern and syllabus.</p>
    </div>

    <div class="test-card">
        <div class="test-header">
            <div>
                <div class="test-title">Subject Wise: Mathematics</div>
                <div class="test-meta">
                    <span>⏱️ 60 Mins</span>
                    <span>📝 30 Qs</span>
                </div>
            </div>

</div>

</body>
</html>
