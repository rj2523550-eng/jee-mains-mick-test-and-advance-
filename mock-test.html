<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEE Mains Mock Test - NTA Style</title>
    
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root { --nta-blue: #2196F3; --nta-green: #2e7d32; --nta-red: #c62828; }
        body { font-family: Arial, sans-serif; margin: 0; background-color: #f4f7f9; }
        
        /* Login Section */
        #login-screen { display: flex; justify-content: center; align-items: center; height: 100vh; background: #e3f2fd; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; }
        .login-box input, .login-box select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        
        /* Main Interface */
        #test-interface { display: none; grid-template-columns: 1fr 300px; height: 100vh; }
        
        /* Header */
        .header { grid-column: 1 / 3; background: #fff; border-bottom: 2px solid #ddd; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Question Area */
        .question-container { padding: 20px; overflow-y: auto; background: white; }
        .question-text { font-size: 1.2rem; margin-bottom: 20px; font-weight: bold; }
        .options { margin-bottom: 30px; }
        .option-item { display: block; padding: 10px; border: 1px solid #ddd; margin-bottom: 10px; border-radius: 5px; cursor: pointer; }
        .option-item:hover { background: #f0f0f0; }
        
        /* Buttons right under options */
        .action-buttons { display: flex; gap: 10px; margin-top: 20px; }
        button { padding: 10px 25px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-next { background: var(--nta-blue); color: white; }
        .btn-clear { background: #eee; color: #333; }

        /* Sidebar */
        .sidebar { background: #fff; border-left: 1px solid #ddd; padding: 15px; display: flex; flex-direction: column; }
        .timer-box { font-size: 1.5rem; text-align: center; font-weight: bold; color: var(--nta-red); margin-bottom: 20px; }
        .question-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .q-num { width: 40px; height: 40px; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; cursor: pointer; border-radius: 0 0 10px 10px; }
        .answered { background: var(--nta-green); color: white; }
        .not-answered { background: var(--nta-red); color: white; }

        /* Results */
        #result-screen { display: none; padding: 50px; text-align: center; }
        .score-history { margin-top: 30px; max-width: 500px; margin-inline: auto; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="text-align:center">Candidate Login</h2>
            <input type="text" id="stuName" placeholder="Full Name" required>
            <input type="text" id="stuDist" placeholder="District" required>
            <input type="text" id="stuState" placeholder="State" required>
            <button onclick="startTest()" style="width: 100%; background: #2e7d32; color: white;">Start Test</button>
        </div>
    </div>

    <div id="test-interface">
        <div class="header">
            <h3 id="display-name">Candidate Name</h3>
            <div>JEE MAINS MOCK TEST 2026</div>
        </div>

        <div class="question-container">
            <div id="question-area">
                <p>Wait, loading questions...</p>
                </div>
            <div class="action-buttons">
                <button class="btn-clear" onclick="clearOption()">Clear Selection</button>
                <button class="btn-next" onclick="nextQuestion()">Save & Next</button>
            </div>
        </div>

        <div class="sidebar">
            <div class="timer-box" id="timer">03:00:00</div>
            <h4>Question Palette:</h4>
            <div class="question-grid" id="q-palette">
                </div>
            <hr>
            <button onclick="submitTest()" style="background: var(--nta-red); color:white; width: 100%;">Final Submit</button>
        </div>
    </div>

    <div id="result-screen">
        <h1>Test Completed!</h1>
        <h2 id="final-score-display">Your Score: 0 / 300</h2>
        <button onclick="shareOnWhatsApp()" style="background: #25D366; color: white;">Share Score on WhatsApp</button>
        
        <div class="score-history">
            <h3>Recent 10 Test Scores</h3>
            <ul id="history-list" style="list-style: none; padding: 0;"></ul>
        </div>
        <button onclick="location.reload()" style="margin-top:20px;">Take Another Test</button>
    </div>

    <script>
        // DATA: Yahan apne 75 Questions add karein
        const questions = [
            {
                q: "What is the derivative of $$f(x) = \sin(x^2)$$?",
                options: ["$$2x \cos(x^2)$$ ", "$$\cos(x^2)$$ ", "$$2x \sin(x)$$ ", "$$-2x \cos(x^2)$$"],
                correct: 0
            },
            {
                q: "Chemistry: Which gas is known as Laughing Gas?",
                options: ["$$N_2O$$", "$$NO_2$$", "$$NH_3$$", "$$CO_2$$"],
                correct: 0
            },
            // JAGA CHODI GAYI HAI: Yahan 75 tak questions copy-paste karein
        ];

        let currentIdx = 0;
        let userAnswers = new Array(questions.length).fill(null);
        let timeLeft = 3 * 60 * 60; // 3 hours

        function startTest() {
            const name = document.getElementById('stuName').value;
            if(!name) return alert("Please enter your name");
            
            document.getElementById('display-name').innerText = "Candidate: " + name;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('test-interface').style.display = 'grid';
            
            initPalette();
            renderQuestion();
            startTimer();
        }

        function initPalette() {
            const palette = document.getElementById('q-palette');
            for(let i=0; i<questions.length; i++) {
                let div = document.createElement('div');
                div.className = 'q-num';
                div.id = `pal-${i}`;
                div.innerText = i + 1;
                div.onclick = () => { currentIdx = i; renderQuestion(); };
                palette.appendChild(div);
            }
        }

        function renderQuestion() {
            const area = document.getElementById('question-area');
            const q = questions[currentIdx];
            
            let html = `<div class="question-text">Question ${currentIdx + 1}: <br> ${q.q}</div>`;
            html += `<div class="options">`;
            q.options.forEach((opt, i) => {
                let checked = userAnswers[currentIdx] === i ? 'checked' : '';
                html += `
                    <label class="option-item">
                        <input type="radio" name="opt" value="${i}" ${checked}> ${opt}
                    </label>
                `;
            });
            html += `</div>`;
            
            area.innerHTML = html;
            
            // Re-render MathJax
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        function nextQuestion() {
            const selected = document.querySelector('input[name="opt"]:checked');
            const palBtn = document.getElementById(`pal-${currentIdx}`);
            
            if(selected) {
                userAnswers[currentIdx] = parseInt(selected.value);
                palBtn.classList.add('answered');
            } else {
                palBtn.classList.add('not-answered');
            }

            if(currentIdx < questions.length - 1) {
                currentIdx++;
                renderQuestion();
            }
        }

        function clearOption() {
            userAnswers[currentIdx] = null;
            renderQuestion();
            document.getElementById(`pal-${currentIdx}`).classList.remove('answered');
        }

        function startTimer() {
            const timerEl = document.getElementById('timer');
            const interval = setInterval(() => {
                let h = Math.floor(timeLeft / 3600);
                let m = Math.floor((timeLeft % 3600) / 60);
                let s = timeLeft % 60;
                
                timerEl.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                
                if(timeLeft <= 0) {
                    clearInterval(interval);
                    submitTest();
                }
                timeLeft--;
            }, 1000);
        }

        function submitTest() {
            let score = 0;
            userAnswers.forEach((ans, i) => {
                if(ans === questions[i].correct) score += 4;
                else if(ans !== null) score -= 1;
            });

            saveScore(score);
            showResults(score);
        }

        function saveScore(newScore) {
            let history = JSON.parse(localStorage.getItem('jee_scores')) || [];
            history.unshift({
                score: newScore,
                date: new Date().toLocaleDateString()
            });
            
            // Keep only last 10
            if(history.length > 10) history.pop();
            
            localStorage.setItem('jee_scores', JSON.stringify(history));
        }

        function showResults(score) {
            document.getElementById('test-interface').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('final-score-display').innerText = `Your Score: ${score} / 300`;
            
            const list = document.getElementById('history-list');
            const history = JSON.parse(localStorage.getItem('jee_scores')) || [];
            list.innerHTML = history.map(h => `<li>Date: ${h.date} - <b>Score: ${h.score}</b></li>`).join('');
        }

        function shareOnWhatsApp() {
            const score = document.getElementById('final-score-display').innerText;
            const text = `Hey! I just completed my JEE Mock Test. ${score}. Target: IIT Bombay!`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
        }
    </script>
</body>
</html>
