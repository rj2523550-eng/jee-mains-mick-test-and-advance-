<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTA Mock Test Portal</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; }
        body { font-family: Arial, sans-serif; margin: 0; background: #f4f7f6; }
        
        /* Login & Notice Section */
        #login-container { max-width: 400px; margin: 50px auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .notice { background: #fff3cd; color: #856404; padding: 10px; border: 1px solid #ffeeba; margin-bottom: 20px; font-size: 14px; border-radius: 5px; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        /* Exam Interface */
        #exam-section { display: none; }
        header { background: var(--primary); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .main-layout { display: flex; height: 80vh; }
        .question-area { flex: 3; padding: 20px; overflow-y: auto; background: white; }
        .sidebar { flex: 1; background: #eef2f3; border-left: 2px solid #ddd; padding: 15px; }
        
        /* Stats Table */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background: #eee; }
    </style>
</head>
<body>

    <div id="login-container">
        <div class="notice">
            <strong>⚠️ NOTICE:</strong> Behtar experience ke liye kripya <b>Desktop Mode</b> on karein.
        </div>
        <h2 style="text-align: center;">NTA Mock Test Login</h2>
        <input type="text" id="userName" placeholder="Apna Naam Likhein" required>
        <input type="text" id="district" placeholder="District" required>
        <select id="state">
            <option value="">State Select Karein</option>
            <option value="UP">Uttar Pradesh</option>
            <option value="Bihar">Bihar</option>
            <option value="Delhi">Delhi</option>
            <option value="MP">Madhya Pradesh</option>
            </select>
        <button onclick="startExam()">Start Test</button>
        
        <h3>Pichle 10 Tests ka Record:</h3>
        <table id="resultsTable">
            <thead>
                <tr><th>Date</th><th>Score</th></tr>
            </thead>
            <tbody id="resultsBody"></tbody>
        </table>
    </div>

    <div id="exam-section">
        <header>
            <div id="student-info"></div>
            <div id="timer">Time Left: 10:00</div>
            <button onclick="submitTest()" style="width: auto; background: #e74c3c;">Submit Test</button>
        </header>

        <div class="main-layout">
            <div class="question-area">
                <h3 id="q-text">Q1: Bharat ki Rajdhani kya hai?</h3>
                <label><input type="radio" name="ans" value="Delhi"> Delhi</label><br>
                <label><input type="radio" name="ans" value="Mumbai"> Mumbai</label><br>
                <label><input type="radio" name="ans" value="Kolkata"> Kolkata</label><br>
            </div>
            <div class="sidebar">
                <h4>Question Palette</h4>
                <div style="display: flex; gap: 5px;">
                    <div style="background: green; color:white; padding: 5px;">1</div>
                    <div style="background: gray; color:white; padding: 5px;">2</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Load Previous History
        window.onload = function() {
            displayResults();
        };

        function startExam() {
            const name = document.getElementById('userName').value;
            const dist = document.getElementById('district').value;
            const state = document.getElementById('state').value;

            if(!name || !dist || !state) {
                alert("Kripya saari jankari bharein!");
                return;
            }

            document.getElementById('login-container').style.display = 'none';
            document.getElementById('exam-section').style.display = 'block';
            document.getElementById('student-info').innerHTML = `Candidate: <b>${name}</b> | ${dist}, ${state}`;
        }

        function submitTest() {
            let score = Math.floor(Math.random() * 100); // Dummy Score Calculation
            alert("Aapka Score: " + score);
            saveResult(score);
            location.reload(); // Reset to login
        }

        function saveResult(score) {
            let history = JSON.parse(localStorage.getItem('mockTestHistory')) || [];
            let date = new Date().toLocaleDateString();
            
            // Naya record add karna
            history.unshift({ date: date, score: score });

            // Agar 10 se zyada ho jayein, toh sabse purana (last) delete kar do
            if(history.length > 10) {
                history.pop();
            }

            localStorage.setItem('mockTestHistory', JSON.stringify(history));
        }

        function displayResults() {
            let history = JSON.parse(localStorage.getItem('mockTestHistory')) || [];
            let tbody = document.getElementById('resultsBody');
            tbody.innerHTML = history.map(res => `<tr><td>${res.date}</td><td>${res.score}%</td></tr>`).join('');
        }
    </script>
</body>
</html>
