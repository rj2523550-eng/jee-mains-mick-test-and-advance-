<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEE Main 2025 Mock Test | Master Hub</title>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root { --p: #003366; --green: #2ecc71; --red: #e74c3c; --gray: #bdc3c7; --blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f9; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: var(--p); color: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; }
        .timer { font-size: 22px; font-weight: bold; background: white; color: #d9534f; padding: 5px 20px; border-radius: 5px; border: 2px solid #d9534f; }
        .sub-nav { background: #e9ecef; padding: 10px 25px; display: flex; gap: 10px; border-bottom: 1px solid #ddd; }
        .sub-btn { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; background: white; font-size: 13px; }
        .active-sub { background: var(--blue) !important; color: white; }
        .main-body { display: flex; flex: 1; overflow: hidden; }
        .question-area { flex: 3; padding: 30px; overflow-y: auto; background: white; }
        .q-title { font-size: 18px; font-weight: bold; color: var(--p); margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .q-text { font-size: 17px; line-height: 1.6; margin-bottom: 25px; color: #333; }
        .option-card { display: flex; align-items: center; padding: 12px; border: 2px solid #f0f0f0; border-radius: 8px; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
        .option-card:hover { border-color: var(--blue); }
        .option-card.selected { border-color: var(--green); background: #f0fff4; }
        .palette-area { flex: 1; background: #fff; padding: 20px; border-left: 1px solid #ddd; display: flex; flex-direction: column; }
        .palette-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; overflow-y: auto; padding: 5px; }
        .q-circle { width: 35px; height: 35px; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .ans { background: var(--green); color: white; border: none; }
        .footer { background: #fff; padding: 15px 30px; border-top: 1px solid #ddd; display: flex; justify-content: space-between; }
        .btn { padding: 10px 25px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-next { background: var(--green); color: white; }
        .btn-submit { background: var(--p); color: white; width: 100%; margin-top: 15px; }
    </style>
</head>
<body>

<div class="header">
    <div><b>JEE Main 2025: 22 Jan Shift-1</b></div>
    <div class="timer" id="timer">180:00</div>
</div>

<div class="sub-nav">
    <button class="sub-btn active-sub" id="nav-phy" onclick="jumpTo(0)">Physics</button>
    <button class="sub-btn" id="nav-chem" onclick="jumpTo(30)">Chemistry</button>
    <button class="sub-btn" id="nav-math" onclick="jumpTo(60)">Mathematics</button>
</div>

<div class="main-body">
    <div class="question-area">
        <div class="q-title" id="qLabel">Question 1</div>
        <div class="q-text" id="qContent">Loading...</div>
        <div id="qOptions"></div>
    </div>
    <div class="palette-area">
        <div style="font-weight: bold; margin-bottom: 10px;">Question Palette</div>
        <div class="palette-grid" id="qPalette"></div>
        <button class="btn btn-submit" onclick="finishTest()">SUBMIT TEST</button>
    </div>
</div>

<div class="footer">
    <button class="btn" style="background:#ddd" onclick="clearAns()">Clear</button>
    <button class="btn btn-next" onclick="saveNext()">Save & Next</button>
</div>

<script>
    // 75 Questions Set (JEE 2025 Standard)
    const questions = [];

    // Physics (1-30)
    for(let i=1; i<=30; i++) {
        questions.push({
            sub: "Physics",
            q: i === 1 ? "Weight of mass m at height h = R/2 above Earth surface is?" : i === 2 ? "Moment of inertia of remaining disc if R/2 hole is removed?" : `Physics Concept Question ${i}: Related to Mechanics/Electrodynamics.`,
            opt: ["Option A", "Option B", "Option C", "Option D"],
            ans: 1
        });
    }
    // Chemistry (31-60)
    for(let i=31; i<=60; i++) {
        questions.push({
            sub: "Chemistry",
            q: i === 31 ? "Which compound gives positive Fehling's test?" : `Chemistry Concept Question ${i}: Organic/Physical/Inorganic.`,
            opt: ["Option A", "Option B", "Option C", "Option D"],
            ans: 2
        });
    }
    // Maths (61-75)
    for(let i=61; i<=75; i++) {
        questions.push({
            sub: "Maths",
            q: i === 61 ? "If a1, a2, a3 are in GP, a1.a3=25 and a2+a4=30, find a6." : `Maths Concept Question ${i}: Calculus/Algebra/Geometry.`,
            opt: ["625", "812", "526", "784"],
            ans: 0
        });
    }

    let currentIdx = 0;
    let responses = Array(75).fill(null);

    function renderQuestion() {
        const q = questions[currentIdx];
        document.getElementById('qLabel').innerText = `${q.sub} - Question ${currentIdx + 1}`;
        document.getElementById('qContent').innerText = q.q;
        
        let html = "";
        q.opt.forEach((o, i) => {
            const isSel = responses[currentIdx] === i ? 'selected' : '';
            html += `<div class="option-card ${isSel}" onclick="selectOpt(${i})">
                <input type="radio" name="opt" ${responses[currentIdx] === i ? 'checked' : ''}> ${o}
            </div>`;
        });
        document.getElementById('qOptions').innerHTML = html;

        // Nav active fix
        document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active-sub'));
        if(currentIdx < 30) document.getElementById('nav-phy').classList.add('active-sub');
        else if(currentIdx < 60) document.getElementById('nav-chem').classList.add('active-sub');
        else document.getElementById('nav-math').classList.add('active-sub');
    }

    function selectOpt(i) {
        responses[currentIdx] = i;
        document.getElementById(`p-${currentIdx}`).classList.add('ans');
        renderQuestion();
    }

    function saveNext() {
        if (currentIdx < 74) { currentIdx++; renderQuestion(); }
    }

    function jumpTo(i) { currentIdx = i; renderQuestion(); }

    function clearAns() {
        responses[currentIdx] = null;
        document.getElementById(`p-${currentIdx}`).classList.remove('ans');
        renderQuestion();
    }

    const pal = document.getElementById('qPalette');
    for(let i=0; i<75; i++) {
        pal.innerHTML += `<div class="q-circle" id="p-${i}" onclick="jumpTo(${i})">${i+1}</div>`;
    }

    let timeLeft = 180 * 60;
    setInterval(() => {
        let m = Math.floor(timeLeft / 60);
        let s = timeLeft % 60;
        document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
        if(timeLeft > 0) timeLeft--;
    }, 1000);

    function finishTest() {
        let score = 0;
        responses.forEach((r, i) => {
            if(r === questions[i].ans) score += 4;
            else if(r !== null) score -= 1;
        });
        alert(`Test Submitted!\nYour Total Score: ${score} / 300`);
    }

    renderQuestion();
</script>
</body>
</html>
