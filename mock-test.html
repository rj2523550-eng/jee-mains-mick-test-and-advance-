<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEE Main 2025 Mock Test | Master Hub</title>
    
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root { --p: #003366; --green: #2ecc71; --red: #e74c3c; --gray: #bdc3c7; --blue: #3498db; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Header */
        .header { background: var(--p); color: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .timer { font-size: 22px; font-weight: bold; background: white; color: #d9534f; padding: 5px 20px; border-radius: 5px; border: 2px solid #d9534f; }

        /* Subject Navigation */
        .sub-nav { background: #e9ecef; padding: 10px 25px; display: flex; gap: 15px; border-bottom: 1px solid #ddd; }
        .sub-btn { padding: 8px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; background: white; color: var(--p); }
        .active-sub { background: var(--blue) !important; color: white; }

        .main-body { display: flex; flex: 1; overflow: hidden; }

        /* Question Section */
        .question-area { flex: 3; padding: 40px; overflow-y: auto; background: white; }
        .q-title { font-size: 20px; font-weight: bold; color: var(--p); border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        .q-text { font-size: 18px; line-height: 1.8; color: #333; margin-bottom: 30px; }
        
        .options-grid { display: flex; flex-direction: column; gap: 15px; }
        .option-card { display: flex; align-items: center; padding: 15px; border: 2px solid #f0f0f0; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .option-card:hover { border-color: var(--blue); background: #f7fbff; }
        .option-card.selected { border-color: var(--green); background: #eafff2; }
        input[type="radio"] { margin-right: 15px; transform: scale(1.3); }

        /* Palette Section */
        .palette-area { flex: 1; background: #fff; padding: 20px; border-left: 2px solid #ddd; display: flex; flex-direction: column; }
        .palette-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; overflow-y: auto; max-height: 400px; padding: 10px; }
        .q-circle { width: 40px; height: 40px; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .ans { background: var(--green); color: white; border: none; }
        .not-ans { background: var(--red); color: white; border: none; }

        /* Footer */
        .footer { background: #fff; padding: 15px 30px; border-top: 1px solid #ddd; display: flex; justify-content: space-between; }
        .btn { padding: 12px 30px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .btn-next { background: var(--green); color: white; }
        .btn-clear { background: var(--gray); color: #333; }
        .btn-submit { background: var(--p); color: white; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size: 18px;"><b>JEE Main 2025: 22 Jan Shift-1 (Mock)</b></div>
    <div class="timer" id="timer">180:00</div>
</div>

<div class="sub-nav">
    <button class="sub-btn active-sub" onclick="jumpTo(0)">Physics</button>
    <button class="sub-btn" onclick="jumpTo(30)">Chemistry</button>
    <button class="sub-btn" onclick="jumpTo(60)">Mathematics</button>
</div>

<div class="main-body">
    <div class="question-area">
        <div class="q-title" id="qLabel">Question 1</div>
        <div class="q-text" id="qContent">Loading question...</div>
        <div class="options-grid" id="qOptions"></div>
    </div>

    <div class="palette-area">
        <div style="font-weight: bold; margin-bottom: 15px;">Question Status</div>
        <div class="palette-grid" id="qPalette"></div>
        <button class="btn btn-submit" onclick="finishTest()">SUBMIT TEST</button>
    </div>
</div>

<div class="footer">
    <button class="btn btn-clear" onclick="clearAns()">Clear Response</button>
    <button class="btn btn-next" onclick="saveNext()">Save & Next</button>
</div>

<script>
    const questions = [
        // PHYSICS SECTION (1-30)
        { id: 1, sub: "Physics", q: "Let g be the acceleration due to gravity at Earth's surface. The weight of a body of mass m at a height h = R/2 above the surface of Earth is:", opt: ["mg/4", "4mg/9", "mg/9", "2mg/3"], ans: 1 },
        { id: 2, sub: "Physics", q: "A circular hole of radius R/2 is removed from a disc of radius R. The moment of inertia of the remaining part about the central axis is:", opt: ["13/32 MR²", "11/32 MR²", "9/32 MR²", "15/32 MR²"], ans: 0 },
        { id: 3, sub: "Physics", q: "An amount of ice of mass 10⁻³ kg at -10°C is transformed into vapour at 110°C. The total work/heat required is:", opt: ["3043 J", "3024 J", "3003 J", "3122 J"], ans: 0 },
        
        // CHEMISTRY SECTION (31-60)
        { id: 31, sub: "Chemistry", q: "Which of the following compounds gives a positive Fehling's test?", opt: ["Benzaldehyde", "Acetophenone", "Glucose", "Acetone"], ans: 2 },
        { id: 32, sub: "Chemistry", q: "The work functions of Cesium (Cs) and Lithium (Li) are 1.9 eV and 2.5 eV. If light of 550 nm is incident, photo-electric effect is possible in:", opt: ["Both Cs and Li", "Neither Cs nor Li", "Cs only", "Li only"], ans: 2 },

        // MATHS SECTION (61-75)
        { id: 61, sub: "Maths", q: "If a₁, a₂, a₃... is a G.P. of increasing positive terms with a₁a₃ = 25 and a₂ + a₄ = 30, then a₆ is:", opt: ["625", "812", "526", "784"], ans: 0 },
        { id: 62, sub: "Maths", q: "Let f(x) be a differentiable function such that f(1)=1 and f(x+y)=f(x)f(y). Then f'(1) is:", opt: ["1", "e", "ln 2", "0"], ans: 1 }
        // Aap isi tarah baaki 75 questions images se dekh kar add kar sakte hain.
    ];

    let currentIdx = 0;
    let responses = Array(questions.length).fill(null);

    function renderQuestion() {
        const q = questions[currentIdx];
        document.getElementById('qLabel').innerText = `${q.sub} - Question ${currentIdx + 1}`;
        document.getElementById('qContent').innerText = q.q;
        
        let html = "";
        q.opt.forEach((o, i) => {
            const isSel = responses[currentIdx] === i ? 'selected' : '';
            html += `<div class="option-card ${isSel}" onclick="selectOpt(${i})">
                <input type="radio" name="opt" ${responses[currentIdx] === i ? 'checked' : ''}> ${o}
            </div>`;
        });
        document.getElementById('qOptions').innerHTML = html;
        if(window.MathJax) MathJax.typeset();
    }

    function selectOpt(i) {
        responses[currentIdx] = i;
        renderQuestion();
        document.getElementById(`p-${currentIdx}`).classList.add('ans');
    }

    function saveNext() {
        if (currentIdx < questions.length - 1) {
            currentIdx++;
            renderQuestion();
        }
    }

    function jumpTo(i) {
        currentIdx = i;
        renderQuestion();
    }

    function clearAns() {
        responses[currentIdx] = null;
        document.getElementById(`p-${currentIdx}`).classList.remove('ans');
        renderQuestion();
    }

    // Palette Init
    const pal = document.getElementById('qPalette');
    for(let i=0; i<questions.length; i++) {
        pal.innerHTML += `<div class="q-circle" id="p-${i}" onclick="jumpTo(${i})">${i+1}</div>`;
    }

    // Timer
    let timeLeft = 180 * 60;
    setInterval(() => {
        let m = Math.floor(timeLeft / 60);
        let s = timeLeft % 60;
        document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
        if(timeLeft > 0) timeLeft--;
    }, 1000);

    function finishTest() {
        let score = 0;
        responses.forEach((r, i) => {
            if(r === questions[i].ans) score += 4;
            else if(r !== null) score -= 1;
        });
        alert(`Test Finished!\nTotal Score: ${score} / ${questions.length * 4}`);
    }

    renderQuestion();
</script>

</body>
</html>
