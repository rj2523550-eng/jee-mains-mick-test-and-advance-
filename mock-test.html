<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEE Master Hub - Full Mock Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML"></script>
    <style>
        :root { --nta-blue: #2196F3; --nta-green: #2e7d32; --nta-red: #c62828; --bg-light: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg-light); color: #333; }
        #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .login-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        .announcement { color: var(--nta-red); font-weight: bold; background: #fff1f1; padding: 10px; border-radius: 5px; margin-bottom: 20px; border: 1px dashed var(--nta-red); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        #test-interface { display: none; grid-template-columns: 1fr 300px; height: 100vh; }
        .header { grid-column: 1 / 3; background: #fff; border-bottom: 2px solid var(--nta-blue); padding: 10px 25px; display: flex; justify-content: space-between; align-items: center; }
        .subject-tabs { grid-column: 1 / 3; background: #e9ecef; display: flex; }
        .tab-btn { padding: 12px 25px; border: none; cursor: pointer; background: none; font-weight: bold; }
        .tab-btn.active { background: white; color: var(--nta-blue); border-top: 3px solid var(--nta-blue); }
        .question-container { padding: 30px; overflow-y: auto; background: white; }
        .options-item { display: block; padding: 15px; border: 1px solid #eee; border-radius: 10px; margin-bottom: 12px; cursor: pointer; }
        .options-item:hover { background: #f0f7ff; }
        .sidebar { background: #fff; border-left: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; }
        .question-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 15px 0; overflow-y: auto; }
        .q-num { width: 35px; height: 35px; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 50%; font-size: 12px; }
        .answered { background: var(--nta-green) !important; color: white; border: none; }
        .current { border: 2px solid var(--nta-blue); font-weight: bold; }
        #result-screen { display: none; padding: 40px 20px; background: white; min-height: 100vh; max-width: 900px; margin: auto; }
        .solution-card { background: #f9f9f9; border-left: 5px solid var(--nta-blue); padding: 15px; margin-bottom: 15px; }
        @media (max-width: 768px) { #test-interface { grid-template-columns: 1fr; } .sidebar { display: none; } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: var(--nta-blue);">JEE Master Hub</h2>
            <p class="announcement">🗓️ Every Sunday: Weekly Test Series</p>
            <input type="text" id="stuName" placeholder="Full Name" required>
            <input type="text" id="stuDist" placeholder="District" required>
            <input type="text" id="stuState" placeholder="State" required>
            <button onclick="startTest()" style="width:100%; padding:15px; background: var(--nta-blue); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">Start Test</button>
            <div id="history-list" style="margin-top:20px; text-align: left; font-size: 14px;"></div>
        </div>
    </div>

    <div id="test-interface">
        <div class="header">
            <div id="display-user">Candidate: --</div>
            <div id="timer" style="font-size: 1.2rem; font-weight: bold; color: var(--nta-red);">60:00</div>
        </div>
        <div class="subject-tabs">
            <button class="tab-btn active" id="btn-physics" onclick="switchSubject('physics')">Physics</button>
            <button class="tab-btn" id="btn-chemistry" onclick="switchSubject('chemistry')">Chemistry</button>
            <button class="tab-btn" id="btn-maths" onclick="switchSubject('maths')">Mathematics</button>
        </div>
        <div class="question-container">
            <div id="question-area"></div>
            <div style="margin-top:30px;">
                <button onclick="clearOption()" style="padding:10px 20px;">Clear</button>
                <button onclick="nextQuestion()" style="padding:10px 30px; background:var(--nta-blue); color:white; border:none; float:right;">Save & Next</button>
            </div>
        </div>
        <div class="sidebar">
            <h3>Palette</h3>
            <div class="question-grid" id="q-palette"></div>
            <button onclick="confirmSubmit()" style="margin-top:auto; padding:15px; background:var(--nta-red); color:white; border:none; cursor:pointer;">Submit Test</button>
        </div>
    </div>

    <div id="result-screen">
        <h1 style="text-align:center;">Result: <span id="final-score">0</span>/300</h1>
        <div style="text-align:center; margin-bottom:20px;">
            <button onclick="shareResult()" style="background:#25D366; color:white; padding:10px 20px; border:none; border-radius:5px;">Share on WhatsApp</button>
        </div>
        <div id="solutions-area"></div>
    </div>

    <script>
        const examData = {

                { q: "A block of mass $m$ is pushed against a vertical wall by a horizontal force $F$. If the coefficient of friction is $\\mu$, the minimum force $F$ required to hold the block is:", options: ["$mg/\\mu$", "$\\mu mg$", "$mg$", "$mg/(1+\\mu)$"], correct: 0, solution: "Friction $f = \\mu F$. To hold the block, $f \\ge mg \\Rightarrow \\mu F \\ge mg \\Rightarrow F \\ge mg/\\mu$." },
                { q: "A variable force $F = 3x^2$ acts on a particle of mass 1 kg initially at rest. The work done by the force during the first 2 seconds is:", options: ["16 J", "32 J", "48 J", "24 J"], correct: 0, solution: "$a = F/m = 3x^2$. Using $v dv/dx$, we find $v = \\sqrt{2x^3}$. At $t=2s$, $W = \\Delta KE = 16 J$." },
                { q: "A thin uniform rod of length $L$ and mass $M$ is swinging freely. Its maximum angular speed is $\\omega$. Its center of mass rises to a maximum height of:", options: ["$L^2\\omega^2/3g$", "$L^2\\omega^2/6g$", "$L^2\\omega^2/2g$", "$L^2\\omega^2/4g$"], correct: 1, solution: "By energy conservation: $\\frac{1}{2} I \\omega^2 = Mgh$. For rod $I = ML^2/3$. So, $h = L^2\\omega^2/6g$." },
                { q: "If the distance between Earth and Sun becomes 1/4th, the duration of the year will become:", options: ["1/4 times", "1/2 times", "1/8 times", "8 times"], correct: 2, solution: "Kepler's Law: $T^2 \\propto R^3$. If $R \\to R/4$, then $T \\to (1/4)^{3/2} = 1/8$." },
                { q: "In a capillary tube of radius $r$, water rises to height $h$ (mass $M$). If radius is doubled, the mass of water that will rise is:", options: ["$M$", "$2M$", "$M/2$", "$4M$"], correct: 1, solution: "Mass $M \\propto r$. Doubling $r$ doubles $M$." },
                { q: "An ideal gas ($\\gamma = 1.5$) is expanded adiabatically such that its volume becomes 8 times. $P_{f}/P_{i}$ is:", options: ["1/32", "1/16", "1/64", "1/8"], correct: 0, solution: "$P_2/P_1 = (V_1/V_2)^{1.5} = (1/8)^{1.5} = 1/32$." },
                { q: "Two vessels A and B contain same gas. $V_A=2V_B, P_A=0.5P_B, T_A=2T_B$. Ratio of molecules $N_A:N_B$ is:", options: ["1:2", "2:1", "1:4", "4:1"], correct: 0, solution: "$N = PV/RT$. Ratio = $(0.5 \\times 2)/2 = 0.5 = 1:2$." },
                { q: "Simple pendulum $T = 2\\pi\\sqrt{L/g}$. $L=20$cm (1mm accuracy), $t=90$s for 100 osc (1s res). % error in $g$:", options: ["3%", "2.7%", "5%", "3.5%"], correct: 1, solution: "Error $\\approx 2.7\\%$." },
                { q: "String fundamental frequency is 10 Hz. Tension increased by 21%, new frequency is:", options: ["11 Hz", "12.1 Hz", "14.4 Hz", "10.5 Hz"], correct: 0, solution: "$f \\propto \\sqrt{T} \\Rightarrow 10 \\times \\sqrt{1.21} = 11$." },
                { q: "Three charges Q, q, Q at vertices of equilateral triangle. If net force on q is zero, Q is:", options: ["$q$", "$-q$", "$0$", "Not possible"], correct: 3, solution: "Vector sum cannot be zero for non-zero charges." },
                { q: "Capacitance C with dielectric slab $d$ and plate separation $D$ is:", options: ["$\\epsilon_0 A / (D-d(1-1/K))$", "$\\epsilon_0 A / (D+d(1-1/K))$", "Standard formula", "None"], correct: 0, solution: "Standard derivation." },
                { q: "Power delivered to variable resistance R from cell (E, r) is maximum when:", options: ["$R = r$", "$R = r/2$", "$R = 2r$", "$R \\to 0$"], correct: 0, solution: "Max Power Transfer Theorem." },
                { q: "Charged particle moves with constant velocity in E and B fields. Then:", options: ["$E \\perp B$", "$E \\parallel B$", "$v \\parallel E$", "None"], correct: 0, solution: "Forces must cancel out." },
                { q: "Circular loop radius $r$ rotating with $\\omega$ in B perpendicular to axis. Max induced emf is:", options: ["$B\\pi r^2 \\omega$", "$2B\\pi r^2 \\omega$", "Half", "Zero"], correct: 0, solution: "$NBA\\omega$." },
                { q: "In LCR at resonance, phase difference between current and voltage is:", options: ["$\\pi/2$", "$\\pi/4$", "$0$", "$\\pi$"], correct: 2, solution: "Purely resistive behavior." },
                { q: "Glass slab ($\\mu=1.5$) of 6cm thickness. Shift in letters is:", options: ["2 cm", "4 cm", "1 cm", "3 cm"], correct: 0, solution: "$6(1-1/1.5)=2$." },
                { q: "In YDSE, intensity where path difference is $\\lambda/6$ is:", options: ["$I_0/4$", "$I_0/2$", "$3I_0/4$", "Full"], correct: 2, solution: "$I = I_0 \\cos^2(\\pi/6) = 3I_0/4$." },
                { q: "Stopping potential $3V_0$ for $\\lambda$ and $V_0$ for $2\\lambda$. Threshold $\\lambda_0$ is:", options: ["$3\\lambda$", "$4\\lambda$", "$2\\lambda$", "None"], correct: 1, solution: "Einstein's Equation." },
                { q: "CE amplifier, $R_c=2k\\Omega, V_{out}=2V, \\beta=100, R_b=1k\\Omega$. $V_{in}$ is:", options: ["10 mV", "20 mV", "30 mV", "1 mV"], correct: 0, solution: "$V_{in} = I_b R_b = 10mV$." },
                { q: "Mass 2kg, $x = t^3/3$. Work done in first 2s (J):", options: ["8", "16", "32", "64"], correct: 1, solution: "16J" },

            chemistry: [

                { q: "Gibbs energy for $E^\\circ=0.24V, n=2$:", options: ["-46.3 kJ", "46.3 kJ", "-23 kJ", "None"], correct: 0, solution: "-46.3 kJ" },
                { q: "First order: 2M to 0.15M in 200 min. $k$ is:", options: ["0.0129", "0.05", "0.23", "1.1"], correct: 0, solution: "0.0129" },
                { q: "Incorrect for Borax:", options: ["All B are sp3", "sp2 and sp3 mixed", "Five bonds", "Alkaline"], correct: 0, solution: "Mixed hybridization." },
                { q: "Spectrochemical series correct order:", options: ["Cl- < F- < CN-", "CN- < F-", "F- < Cl-", "None"], correct: 0, solution: "Cl < F < CN" },
                { q: "Copper extraction step:", options: ["Self reduction", "Slag formation", "Oxidation", "All"], correct: 3, solution: "All steps." },
                { q: "Stability: Benzyl (I), Allyl (II), Propyl (III):", options: ["I > II > III", "III > II > I", "II > I > III", "None"], correct: 0, solution: "I > II > III" },
                { q: "Chiral centers in 2,3,4-trichloropentane:", options: ["2", "3", "1", "0"], correct: 0, solution: "2" },
                { q: "Ozonolysis gives glyoxal from:", options: ["Benzene", "Ethene", "Butene", "None"], correct: 0, solution: "Benzene" },
                { q: "tert-butyl bromide + NaOEt gives:", options: ["Isobutylene", "Ether", "Butene", "None"], correct: 0, solution: "Elimination" },
                { q: "Phenol acidity is due to:", options: ["Resonance", "Inductive", "Weight", "None"], correct: 0, solution: "Resonance" },

                { q: "Acid strength order:", options: ["ClCH2COOH > HCOOH > AcOH", "AcOH > HCOOH", "None", "None"], correct: 0, solution: "Chloro > Formic > Acetic" },

                { q: "0.01M acid, 10% ionised. $K_a$:", options: ["1e-4", "1e-2", "None", "None"], correct: 0, solution: "1e-4" },
                { q: "Isomers of 2,3-dichlorobutane:", options: ["3", "2", "4", "None"], correct: 0, solution: "3 (inc. meso)" },
                { q: "Oxygens in Pyrophosphoric acid:", options: ["7", "6", "5", "None"], correct: 0, solution: "7" },
                { q: "H+ coefficient in balanced MnO4- + Oxalate:", options: ["16", "8", "10", "None"], correct: 0, solution: "16" }
            ],
            maths: [
                { q: "Domain of $\\sqrt{\\log_{0.4} (\\frac{x-1}{x+5})}$:", options: ["(-\\infty, -5) \\cup [1, \\infty)", "(1, \\infty)", "None", "None"], correct: 0, solution: "Check arg > 0 and log >= 0." },
                { q: "Value of $(1+\\omega-\\omega^2)^7$:", options: ["-128\\omega^2", "128\\omega^2", "None", "None"], correct: 0, solution: "-128w^2" },
                { q: "Matrix det $5e^{-t}$ means:", options: ["Always invertible", "Never", "None", "None"], correct: 0, solution: "det != 0" },
                { q: "Solutions of $x^2 - 3|x| + 2 = 0$:", options: ["4", "2", "3", "None"], correct: 0, solution: "+-1, +-2" },
                { q: "Variance of green balls (15G, 10Y, n=10):", options: ["2.4", "2", "3", "None"], correct: 0, solution: "npq = 2.4" },
                { q: "HP 10th=21, 21st=10, 210th=? :", options: ["1", "0", "2", "None"], correct: 0, solution: "1" },
                { q: "Indep. term of $(2x^2 - 1/3x^2)^{10}$:", options: ["-C(10,5)32/243", "C(10,5)", "None", "None"], correct: 0, solution: "Middle term" },
                { q: "Limit value at x=0:", options: ["1", "0", "2", "None"], correct: 0, solution: "1" },
                { q: "f(0) for continuity if k is:", options: ["-1", "1", "0", "None"], correct: 0, solution: "-1" },

            if(!document.getElementById('stuName').value) return alert("Enter Name");
            document.getElementById('display-user').innerText = `Candidate: ${document.getElementById('stuName').value}`;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('test-interface').style.display = 'grid';
            startTimer(); switchSubject('physics');
        }

        function switchSubject(sub) {
            currentSub = sub; currentIdx = 0;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + sub).classList.add('active');
            renderPalette(); renderQuestion();
        }

        function renderPalette() {
            const palette = document.getElementById('q-palette'); palette.innerHTML = '';
            examData[currentSub].forEach((_, i) => {
                const div = document.createElement('div');
                div.className = `q-num ${userAnswers[currentSub + i] !== undefined ? 'answered' : ''}`;
                div.innerText = i + 1; div.onclick = () => { currentIdx = i; renderQuestion(); };
                palette.ap
